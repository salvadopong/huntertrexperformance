<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNTER TREX - ULTIMATE EDITION</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Cinzel', serif;
            user-select: none;
        }
        #game-canvas { width: 100vw; height: 100vh; display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 50;
        }
        
        .menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(20,0,40,0.98) 0%, rgba(0,0,0,0.98) 100%);
            backdrop-filter: blur(30px) saturate(300%);
            -webkit-backdrop-filter: blur(30px) saturate(300%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
            text-align: center;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .menu::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(0deg, transparent 0px, rgba(255,215,0,0.03) 2px, transparent 4px);
            animation: scanlines 8s linear infinite;
            pointer-events: none;
        }
        .menu::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }
        @keyframes scanlines {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0%); }
        }
        
        .glory-panel {
            background: rgba(5,2,15,0.6);
            backdrop-filter: blur(50px) saturate(300%);
            -webkit-backdrop-filter: blur(50px) saturate(300%);
            border: 3px solid;
            border-image: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700) 1;
            padding: 50px 80px;
            border-radius: 80px;
            box-shadow: 0 0 200px rgba(255,215,0,0.4), 0 0 400px rgba(255,140,0,0.2), 0 30px 80px rgba(0,0,0,0.9), inset 0 0 80px rgba(255,215,0,0.15), inset 0 2px 4px rgba(255,255,255,0.1);
            max-width: 1200px;
            position: relative;
            overflow: visible;
            margin: 20px;
            animation: panelGlow 2s ease-in-out infinite alternate;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(2deg);
            z-index: 2;
        }
        @keyframes panelGlow {
            0% { box-shadow: 0 0 150px rgba(255,215,0,0.3), 0 0 300px rgba(255,140,0,0.15), 0 30px 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.3); }
            100% { box-shadow: 0 0 250px rgba(255,215,0,0.5), 0 0 500px rgba(255,140,0,0.25), 0 30px 80px rgba(0,0,0,0.9), inset 0 0 100px rgba(255,215,0,0.2); border-color: rgba(255,215,0,0.6); }
        }
        .glory-panel::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent 30%, rgba(255,215,0,0.1) 50%, transparent 70%);
            border-radius: 80px;
            pointer-events: none;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        h1 { 
            font-size: 120px; 
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 20%, #ff8c00 40%, #ffd700 60%, #ffed4e 80%, #ff8c00 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0; letter-spacing: 20px; font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 100px rgba(255,215,0,0.8), 0 0 200px rgba(255,140,0,0.5), 0 10px 20px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
            animation: titleShine 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px #ffd700);
        }
        @keyframes titleShine {
            0%, 100% { background-position: 0% 50%; filter: drop-shadow(0 0 30px #ffd700); }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 50px #ffaa00); }
        }
        .subtitle {
            font-size: 24px; letter-spacing: 12px; color: #ffd700;
            text-transform: uppercase; margin-top: 15px;
            position: relative; z-index: 2;
            text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,140,0,0.4);
            animation: subtitlePulse 2s ease-in-out infinite;
        }
        @keyframes subtitlePulse {
            0%, 100% { opacity: 0.8; letter-spacing: 12px; }
            50% { opacity: 1; letter-spacing: 15px; }
        }
        .btn {
            margin: 15px; padding: 22px 70px; font-size: 24px; font-weight: bold; 
            color: #fff; 
            background: linear-gradient(135deg, rgba(255,215,0,0.2) 0%, rgba(255,140,0,0.15) 50%, rgba(255,215,0,0.2) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255,215,0,0.5); 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 60px;
            text-transform: uppercase; letter-spacing: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,215,0,0.1) inset, 0 0 30px rgba(255,215,0,0.2);
            position: relative; z-index: 2; overflow: hidden; pointer-events: auto;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,215,0,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:hover::before { width: 300px; height: 300px; }
        .btn:hover { 
            background: linear-gradient(135deg, rgba(255,215,0,0.4) 0%, rgba(255,140,0,0.3) 50%, rgba(255,215,0,0.4) 100%);
            transform: scale(1.08) translateY(-3px); 
            box-shadow: 0 20px 60px rgba(255,215,0,0.4), 0 0 0 3px rgba(255,215,0,0.4) inset, 0 0 50px rgba(255,215,0,0.4);
            border-color: rgba(255,215,0,0.9); letter-spacing: 12px;
        }
        .btn.save-btn {
            background: linear-gradient(135deg, rgba(100,200,100,0.2) 0%, rgba(50,150,50,0.15) 50%, rgba(100,200,100,0.2) 100%);
            border-color: rgba(100,200,100,0.5);
        }
        .btn.save-btn:hover {
            background: linear-gradient(135deg, rgba(100,200,100,0.4) 0%, rgba(50,150,50,0.3) 50%, rgba(100,200,100,0.4) 100%);
            box-shadow: 0 20px 60px rgba(100,200,100,0.4), 0 0 50px rgba(100,200,100,0.3);
            border-color: rgba(100,200,100,0.9);
        }
        .feature-list {
            display: flex; justify-content: center; gap: 80px;
            margin: 40px 0; position: relative; z-index: 2; flex-wrap: wrap;
        }
        .feature {
            text-align: center; backdrop-filter: blur(15px);
            padding: 25px 35px; border-radius: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,215,0,0.1);
            transition: all 0.3s;
            animation: featureFloat 3s ease-in-out infinite;
        }
        .feature:nth-child(2) { animation-delay: 0.5s; }
        .feature:nth-child(3) { animation-delay: 1s; }
        @keyframes featureFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .feature:hover {
            transform: scale(1.1) translateY(-5px);
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 30px rgba(255,215,0,0.2);
        }
        .feature-icon { font-size: 60px; margin-bottom: 15px; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6)); }
        .feature-text { font-size: 16px; letter-spacing: 5px; color: #ffd700; text-transform: uppercase; font-weight: bold; }

        #fps-counter {
            position: fixed; top: 75px; left: 25px;
            color: #0f0; font-family: monospace; font-size: 11px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            padding: 8px 15px; border-radius: 20px;
            pointer-events: none; z-index: 200;
            border: 1px solid rgba(0,255,0,0.3);
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        .stat-box {
            position: fixed; 
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(255,215,0,0.3); 
            border-radius: 25px; padding: 18px 25px; color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,215,0,0.1);
            z-index: 200;
        }
        #health-container { bottom: 25px; left: 25px; width: 280px; }
        #health-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #health-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4444, #ffaa00, #ff4444); background-size: 200% 100%; animation: healthPulse 2s ease infinite; transition: width 0.2s; }
        @keyframes healthPulse { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        #ammo-container { bottom: 25px; right: 25px; text-align: right; min-width: 160px; }
        #ammo-text { font-size: 52px; font-weight: 900; line-height: 1; text-shadow: 0 4px 15px rgba(0,0,0,0.6); }

        #score-board { top: 25px; left: 25px; min-width: 180px; }
        .score-val { font-size: 26px; font-weight: 900; color: #ffd700; text-shadow: 0 4px 15px rgba(0,0,0,0.6); }

        #inventory {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 200;
        }
        .slot {
            width: 65px; height: 65px; 
            background: rgba(20,20,40,0.6); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.3); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.3s; pointer-events: auto;
            font-weight: bold; font-size: 22px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3), inset 0 0 15px rgba(255,215,0,0.1);
        }
        .slot.active { 
            border: 3px solid #ffd700; background: rgba(255,215,0,0.2);
            transform: translateY(-8px); 
            box-shadow: 0 12px 30px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.2);
        }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background: rgba(255,255,255,0.95);
            border-radius: 50%; box-shadow: 0 0 25px rgba(255,255,255,0.8);
            pointer-events: none; z-index: 100;
        }
        #crosshair::before {
            content: ''; position: absolute; top: -12px; left: 2.5px;
            width: 2px; height: 8px; background: rgba(255,255,255,0.9);
        }
        #crosshair::after {
            content: ''; position: absolute; bottom: -12px; left: 2.5px;
            width: 2px; height: 8px; background: rgba(255,255,255,0.9);
        }
        #crosshair .left {
            position: absolute; top: 2.5px; left: -12px;
            width: 8px; height: 2px; background: rgba(255,255,255,0.9);
        }
        #crosshair .right {
            position: absolute; top: 2.5px; right: -12px;
            width: 8px; height: 2px; background: rgba(255,255,255,0.9);
        }

        #damage-nums { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 150; }
        .dmg-popup {
            position: absolute; color: #fff; font-weight: 900; font-size: 38px;
            text-shadow: 0 0 30px rgba(255,200,0,0.9), 0 0 60px rgba(255,100,0,0.6); 
            animation: dmgAnim 0.8s ease-out forwards;
        }
        .dmg-popup.headshot {
            color: #ffd700;
            text-shadow: 0 0 40px #ffaa00, 0 0 80px #ff8800, 0 0 120px #ff4400;
            font-size: 52px;
            animation: headshotAnim 1s ease-out forwards;
        }
        @keyframes dmgAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.3); }
            20% { opacity: 1; transform: translateY(-40px) scale(1.3); }
            100% { opacity: 0; transform: translateY(-140px) scale(1); }
        }
        @keyframes headshotAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.4) rotate(-10deg); }
            15% { opacity: 1; transform: translateY(-50px) scale(1.8) rotate(5deg); }
            100% { opacity: 0; transform: translateY(-180px) scale(1) rotate(0deg); }
        }

        #sniper-scope {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; align-items: center; justify-content: center;
            background: transparent; z-index: 50; pointer-events: none;
        }
        #scope-lens {
            width: 85vh; height: 85vh; border: 5px solid rgba(0,0,0,0.9); border-radius: 50%;
            position: relative; overflow: hidden;
            box-shadow: 0 0 0 2000px #000, inset 0 0 50px rgba(0,0,0,0.95);
        }
        .scope-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.95); box-shadow: 0 0 12px #fff; }
        .scope-line-v { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: rgba(255,255,255,0.95); box-shadow: 0 0 12px #fff; }

        #level-up-notif {
            position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 80px; font-weight: 900; letter-spacing: 15px;
            opacity: 0; pointer-events: none; 
            text-shadow: 0 0 60px rgba(255,215,0,0.9), 0 0 120px rgba(255,165,0,0.6);
            z-index: 150; transition: opacity 0.5s; text-align: center;
        }

        #stats-panel {
            position: fixed; top: 25px; right: 25px; color: #ffd700; font-size: 14px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            padding: 15px 22px; border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.3);
            pointer-events: none; z-index: 200;
        }

        #zombie-counter {
            position: fixed; top: 110px; right: 25px; color: #ff4444; font-size: 16px;
            font-weight: bold; text-shadow: 0 0 30px rgba(255,0,0,0.7);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            padding: 12px 20px; border-radius: 20px;
            border: 1px solid rgba(255,0,0,0.3);
            pointer-events: none; z-index: 200;
        }

        #customize-menu { display: none; }
        
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            margin: 20px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }
        .weapon-grid::-webkit-scrollbar { width: 10px; }
        .weapon-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .weapon-grid::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 10px; }
        .weapon-grid::-webkit-scrollbar-thumb:hover { background: rgba(255,215,0,0.5); }
        
        .weapon-card {
            background: rgba(10,5,20,0.6); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.2); border-radius: 20px;
            padding: 18px 12px; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .weapon-card:hover {
            background: rgba(255,215,0,0.15); border-color: #ffd700;
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.2);
        }
        .weapon-card.selected {
            border: 3px solid #ffd700; background: rgba(255,215,0,0.25);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        .weapon-name { font-size: 15px; font-weight: bold; color: #ffd700; margin-bottom: 8px; }
        .weapon-stats { font-size: 11px; color: #ddd; line-height: 1.5; }
        
        .slot-selector {
            display: flex; gap: 20px; justify-content: center;
            margin: 25px 0; padding: 20px;
            background: rgba(0,0,0,0.3); border-radius: 25px;
            backdrop-filter: blur(10px); flex-wrap: wrap;
        }
        .slot-btn {
            width: 80px; height: 80px;
            background: rgba(10,5,20,0.7); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.3); border-radius: 20px;
            color: white; font-size: 28px; font-weight: bold;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); pointer-events: auto;
        }
        .slot-btn:hover { transform: translateY(-3px); border-color: rgba(255,215,0,0.6); box-shadow: 0 8px 20px rgba(255,215,0,0.2); }
        .slot-btn.active {
            border: 3px solid #ffd700; background: rgba(255,215,0,0.25);
            transform: translateY(-5px); box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        .customize-header { margin-bottom: 20px; }
        .customize-header h1 { font-size: 60px; letter-spacing: 10px; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="start-menu" class="menu" style="display: flex;">
        <div class="glory-panel">
            <h1>HUNTER TREX</h1>
            <div class="subtitle">ULTIMATE EDITION</div>
            <div style="height: 3px; background: linear-gradient(to right, transparent, rgba(255,215,0,0.8), transparent); margin: 35px 0;"></div>
            <div class="feature-list">
                <div class="feature"><div class="feature-icon">🎯</div><div class="feature-text">PRECISION</div></div>
                <div class="feature"><div class="feature-icon">⚡</div><div class="feature-text">DYNAMIC</div></div>
                <div class="feature"><div class="feature-icon">💀</div><div class="feature-text">ENDLESS</div></div>
            </div>
            <p style="color: #ddd; font-size: 18px; letter-spacing: 4px; margin: 25px 0; text-shadow: 0 0 20px rgba(255,215,0,0.5);">
                <span style="color: #ffd700; font-size: 22px; font-weight: bold;">+2 DMG & +5 MAG PER LEVEL</span>
            </p>
            <div style="height: 3px; background: linear-gradient(to right, transparent, rgba(255,215,0,0.5), transparent); margin: 30px 0;"></div>
            <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;">
                <button class="btn" id="play-btn">BEGIN HUNT</button>
                <button class="btn" id="customize-btn">CUSTOMIZE</button>
            </div>
        </div>
    </div>

    <div id="customize-menu" class="menu">
        <div class="glory-panel">
            <div class="customize-header"><h1>CUSTOMIZE</h1></div>
            <div class="slot-selector">
                <button class="slot-btn active" data-slot="0">1</button>
                <button class="slot-btn" data-slot="1">2</button>
                <button class="slot-btn" data-slot="2">3</button>
                <button class="slot-btn" data-slot="3">4</button>
                <button class="slot-btn" data-slot="4">5</button>
            </div>
            <div id="weapon-grid" class="weapon-grid"></div>
            <div style="display: flex; gap: 25px; justify-content: center; margin-top: 25px; flex-wrap: wrap;">
                <button class="btn save-btn" id="save-btn">SAVE LOADOUT</button>
                <button class="btn" id="back-btn">BACK</button>
            </div>
        </div>
    </div>

    <div id="death-menu" class="menu" style="display: none;">
        <div class="glory-panel">
            <h1>FALLEN</h1>
            <p id="final-stats" style="font-size: 22px; color: #ffd700; margin: 30px 0;"></p>
            <button class="btn" onclick="location.reload()">RISE AGAIN</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="sniper-scope">
            <div id="scope-lens">
                <div class="scope-line-h"></div>
                <div class="scope-line-v"></div>
            </div>
        </div>
        <div id="crosshair"><div class="left"></div><div class="right"></div></div>
        <div id="damage-nums"></div>
        <div id="level-up-notif">WAVE CLEARED</div>
        <div id="fps-counter">FPS: 0</div>
        <div id="stats-panel">
            <div>⚔️ +<span id="dmg-bonus">0</span> DMG</div>
            <div>📦 +<span id="mag-bonus">0</span> MAG</div>
            <div>🧟 <span id="zombie-count">0</span> WAVE</div>
        </div>
        <div id="zombie-counter">🧟 <span id="zombies-remaining">0</span> LEFT</div>
        <div id="score-board" class="stat-box">
            <div style="font-size: 10px; opacity: 0.7; letter-spacing: 2px;">LEVEL <span id="lvl-display">1</span></div>
            <div class="score-val" id="score-display">00000</div>
        </div>
        <div id="health-container" class="stat-box">
            <div style="font-size: 10px; letter-spacing: 3px; opacity: 0.7;">VITALITY</div>
            <div id="health-text" style="font-size: 28px; font-weight: 900;">300</div>
            <div id="health-bar-bg"><div id="health-bar-fill"></div></div>
        </div>
        <div id="ammo-container" class="stat-box">
            <div id="weapon-name" style="font-size: 10px; letter-spacing: 3px; opacity: 0.7;">ASSAULT RIFLE</div>
            <div id="ammo-text">35</div>
        </div>
        <div id="inventory">
            <div class="slot active" id="slot-0">1</div>
            <div class="slot" id="slot-1">2</div>
            <div class="slot" id="slot-2">3</div>
            <div class="slot" id="slot-3">4</div>
            <div class="slot" id="slot-4">5</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {

            const audioIds = ['eas', 'crowd', 'police', 'easround', 'ar', 'smg', 'sniper', 'pistol', 'energy', 'reload', 'hit'];
            audioIds.forEach(id => {
                const el = document.createElement('audio');
                el.id = `sound-${id}`;
                el.preload = 'auto';
                document.body.appendChild(el);
                audioElements[id] = el;
            });
        }
        initAudio();

        function playSound(sound) {
            const el = audioElements[sound];
            if (el) {
                el.currentTime = 0;
                el.play().catch(() => {});
            }
        }
        function stopSound(sound) {
            const el = audioElements[sound];
            if (el) {
                el.pause();
                el.currentTime = 0;
            }
        }

        // ============ INITIALIZATION ============
        function initRenderer() {
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('game-canvas'), 
                antialias: true, 
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.8;
        }

        function initScene() {
            scene = new THREE.Scene();
            applyBackdrop(0);
        }

        function initCamera() {
            camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 2000);
            controls = new PointerLockControls(camera, document.body);
            scene.add(controls.getObject());
        }

        function initPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.25, 0.7);
            const smaaPass = new SMAAPass(window.innerWidth, window.innerHeight);
            
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(smaaPass);
        }

        function initLighting() {
            const sun = new THREE.DirectionalLight(0xffeedd, 6.0);
            sun.position.set(80, 180, 40);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 400;
            sun.shadow.camera.left = -150;
            sun.shadow.camera.right = 150;
            sun.shadow.camera.top = 150;
            sun.shadow.camera.bottom = -150;
            scene.add(sun);
            
            const fill1 = new THREE.PointLight(0x88aacc, 4.5);
            fill1.position.set(-50, 30, -50);
            scene.add(fill1);
            const fill2 = new THREE.PointLight(0xccaa88, 4.0);
            fill2.position.set(50, 20, 50);
            scene.add(fill2);
            const fill3 = new THREE.PointLight(0xaaccff, 3.5);
            fill3.position.set(0, 40, 0);
            scene.add(fill3);
            scene.add(new THREE.AmbientLight(0x6080a0, 2.5));
            scene.add(new THREE.HemisphereLight(0x88aacc, 0x665544, 2.8));
        }

        function initMuzzleFlash() {
            muzzleFlashLight = new THREE.PointLight(0xffaa00, 0, 10);
            muzzleFlashLight.position.set(0, -0.3, -1.2);
            camera.add(muzzleFlashLight);
            
            muzzleFlashMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8), 
                new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 })
            );
            muzzleFlashMesh.position.set(0.25, -0.3, -1.0);
            camera.add(muzzleFlashMesh);
        }

        function applyBackdrop(index) {
            environmentObjects.forEach(obj => scene.remove(obj));
            policeCars.forEach(car => scene.remove(car));
            environmentObjects = [];
            policeCars = [];
            
            const backdrop = BACKDROPS[index % BACKDROPS.length];
            scene.background = new THREE.Color(backdrop.skyColor);
            scene.fog = new THREE.FogExp2(backdrop.fogColor, backdrop.fogDensity);
            
            if (forceFieldMesh) scene.remove(forceFieldMesh);
            const forceFieldGeo = new THREE.CylinderGeometry(CONFIG.forceFieldRadius, CONFIG.forceFieldRadius, 50, 64);
            const forceFieldMat = new THREE.MeshStandardMaterial({ 
                color: 0x4488ff, transparent: true, opacity: 0.08, wireframe: true,
                emissive: new THREE.Color(0x224466), emissiveIntensity: 0.3
            });
            forceFieldMesh = new THREE.Mesh(forceFieldGeo, forceFieldMat);
            forceFieldMesh.position.y = 25;
            scene.add(forceFieldMesh);
            
            // Force field particles
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 2000;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                const radius = CONFIG.forceFieldRadius;
                const y = (Math.random() - 0.5) * 40;
                positions[i*3] = Math.cos(angle) * radius;
                positions[i*3+1] = y;
                positions[i*3+2] = Math.sin(angle) * radius;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.1, transparent: true, opacity: 0.3 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            environmentObjects.push(particles);
            
            createEnvironmentDetails(backdrop);
        }
        
        function createEnvironmentDetails(backdrop) {
            const env = backdrop.environment;
            const roadMat = new THREE.MeshStandardMaterial({ color: backdrop.roadColor, roughness: 0.7 });
            const roadWidth = 8;
            const roadLength = CONFIG.forceFieldRadius * 2;
            
            // Main roads
            const road1 = new THREE.Mesh(new THREE.PlaneGeometry(roadWidth, roadLength), roadMat);
            road1.rotation.x = -Math.PI / 2; road1.position.y = 0.05; road1.receiveShadow = true;
            scene.add(road1); environmentObjects.push(road1);
            
            const road2 = new THREE.Mesh(new THREE.PlaneGeometry(roadLength, roadWidth), roadMat);
            road2.rotation.x = -Math.PI / 2; road2.position.y = 0.05; road2.receiveShadow = true;
            scene.add(road2); environmentObjects.push(road2);
            
            // Road markings
            const markingMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, emissive: new THREE.Color(0x442200), emissiveIntensity: 0.2 });
            for (let i = -CONFIG.forceFieldRadius + 20; i < CONFIG.forceFieldRadius; i += 15) {
                const marking = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.5), markingMat);
                marking.rotation.x = -Math.PI / 2; marking.position.set(i, 0.06, 0); marking.receiveShadow = true;
                scene.add(marking); environmentObjects.push(marking);
            }
            for (let i = -CONFIG.forceFieldRadius + 20; i < CONFIG.forceFieldRadius; i += 15) {
                const marking = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 2), markingMat);
                marking.rotation.x = -Math.PI / 2; marking.position.set(0, 0.06, i); marking.receiveShadow = true;
                scene.add(marking); environmentObjects.push(marking);
            }
            
            // Environment-specific elements
            if (env === 'forest') {
                for (let i = 0; i < 80; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    const x = Math.cos(angle) * radius, z = Math.sin(angle) * radius;
                    if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
                    createDetailedTree(x, z, backdrop);
                }
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 40 + Math.random() * 130;
                    createRock(Math.cos(angle) * radius, Math.sin(angle) * radius, 0x666666);
                }
            } else if (env === 'desert') {
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createCactus(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const radius = 120;
                    createPyramid(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'snow') {
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createSnowTree(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 50 + Math.random() * 120;
                    createSnowman(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'volcanic') {
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 40 + Math.random() * 130;
                    createLavaCrack(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const radius = 100;
                    createVolcano(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'alien') {
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 40 + Math.random() * 130;
                    createAlienStructure(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'cyberpunk') {
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createCyberBuilding(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'haunted') {
                for (let i = 0; i < 60; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createGrave(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'tropical') {
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createPalmTree(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'candy') {
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createCandyStructure(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            } else if (env === 'underwater') {
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 140;
                    createCoral(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            }
            
            // Regular buildings
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 50 + Math.random() * 120;
                const x = Math.cos(angle) * radius, z = Math.sin(angle) * radius;
                if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
                createDetailedBuilding(x, z, backdrop);
            }
            
            createPoliceCars();
        }
        
        function createPoliceCars() {
            policeCars.forEach(car => scene.remove(car));
            policeCars = [];
            
            const carPositions = [
                { x: -60, z: 0, rot: Math.PI/2 },
                { x: 60, z: 0, rot: -Math.PI/2 },
                { x: 0, z: -60, rot: 0 },
                { x: 0, z: 60, rot: Math.PI },
                { x: -40, z: -40, rot: Math.PI/4 },
                { x: 40, z: 40, rot: -3*Math.PI/4 }
            ];
            
            carPositions.forEach(pos => {
                const carGroup = new THREE.Group();
                
                // Car body
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(2.5, 0.8, 5), 
                    new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.3, metalness: 0.6 })
                );
                body.position.y = 0.4; body.castShadow = true; body.receiveShadow = true;
                carGroup.add(body);
                
                // Police lights
                const lightBar = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 0.2, 0.5), 
                    new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: new THREE.Color(0xff0000), emissiveIntensity: 0.5 })
                );
                lightBar.position.y = 0.9; carGroup.add(lightBar);
                
                // Blue and red lights
                const blueLight = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15), 
                    new THREE.MeshStandardMaterial({ color: 0x0000ff, emissive: new THREE.Color(0x0000ff), emissiveIntensity: 0.5 })
                );
                blueLight.position.set(0.3, 1.0, 0.8); carGroup.add(blueLight);
                
                const redLight = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15), 
                    new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: new THREE.Color(0xff0000), emissiveIntensity: 0.5 })
                );
                redLight.position.set(-0.3, 1.0, 0.8); carGroup.add(redLight);
                
                // Wheels
                const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
                const wheelPositions = [[-1, 0.3, 1.5], [1, 0.3, 1.5], [-1, 0.3, -1.5], [1, 0.3, -1.5]];
                wheelPositions.forEach(([wx, wy, wz]) => {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI/2; wheel.position.set(wx, wy, wz);
                    wheel.castShadow = true; wheel.receiveShadow = true;
                    carGroup.add(wheel);
                });
                
                carGroup.position.set(pos.x, getH(pos.x, pos.z) + 0.4, pos.z);
                carGroup.rotation.y = pos.rot;
                scene.add(carGroup);
                policeCars.push(carGroup);
            });
        }
        
        // ============ ENVIRONMENT CREATION FUNCTIONS ============
        function createDetailedTree(x, z, backdrop) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.0, 8, 6), new THREE.MeshStandardMaterial({ color: 0x5a4030, roughness: 0.9 }));
            trunk.position.y = 4; trunk.castShadow = trunk.receiveShadow = true; group.add(trunk);
            
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x1a5a1a, roughness: 0.5 });
            for (let i = 0; i < 4; i++) {
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5 - i*0.3, 3, 8), leafMat);
                leaves.position.y = 6 + i * 2; leaves.castShadow = leaves.receiveShadow = true;
                group.add(leaves);
            }
            group.position.set(x, getH(x,z), z);
            scene.add(group); environmentObjects.push(group);
        }
        
        function createRock(x, z, color) {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1 + Math.random()), new THREE.MeshStandardMaterial({ color, roughness: 0.8 }));
            rock.position.set(x, getH(x,z) + 0.5, z); rock.castShadow = true; rock.receiveShadow = true;
            scene.add(rock); environmentObjects.push(rock);
        }
        
        function createCactus(x, z) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x2a6a2a, roughness: 0.7 });
            const main = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 4, 8), mat);

        // ============ WORLD CREATION ============
        function createWorld() {
            const backdrop = BACKDROPS[currentBackdrop % BACKDROPS.length];
            const geo = new THREE.PlaneGeometry(800, 800, 128, 128);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position.array;
            for (let i = 0; i < pos.length; i += 3) {
                pos[i+1] = Math.sin(pos[i]*0.012) * Math.cos(pos[i+2]*0.012) * 6 + Math.sin(pos[i]*0.04) * Math.cos(pos[i+2]*0.04) * 1.5;
            }
            geo.computeVertexNormals();
            const mat = new THREE.MeshStandardMaterial({ color: backdrop.groundColor, roughness: 0.6, metalness: 0.08, envMapIntensity: 0.6 });
            const ground = new THREE.Mesh(geo, mat);
            ground.receiveShadow = true;
            scene.add(ground);
            environmentObjects.push(ground);
        }

        function getH(x, z) {
            return Math.sin(x*0.012) * Math.cos(z*0.012) * 6 + Math.sin(x*0.04) * Math.cos(z*0.04) * 1.5;
        }

        // ============ AMMO SYSTEM ============
        function initializeAmmo() {
            loadout.forEach(id => {
                const w = WEAPONS[id];
                if (w) {
                    if (w.heal) { ammo[id] = w.mag; }
                    else { ammo[id] = w.mag + (w.scope ? 0 : magBonus); }
                    if (w.twinMag) twinMagState[id] = { activeMag: 1 };
                }
            });
            usedHeals = { syringe: false, medkit: false };
            
            // Ensure all weapons have correct ammo
            Object.keys(WEAPONS).forEach(id => {
                const w = WEAPONS[id];
                if (!w.heal && ammo[id] === undefined) {
                    ammo[id] = w.mag + (w.scope ? 0 : magBonus);
                }
            });
        }

        // ============ ZOMBIE SPAWNING ============
        function spawnWave() {
            zombies.forEach(z => scene.remove(z.g));
            deadZombies.forEach(z => scene.remove(z.g));
            zombies.length = 0;
            deadZombies.length = 0;
            
            const baseCount = 30;
            const count = baseCount + (level - 1) * 10;
            zombiesRemaining = count;
            
            document.getElementById('zombie-count').innerText = count;
            document.getElementById('zombies-remaining').innerText = count;
            
            const types = Object.keys(ZOMBIE_TYPES);
            
            for (let i = 0; i < count; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const zData = ZOMBIE_TYPES[type];
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 100;
                const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
                
                const zombie = createZombie(type, zData, x, z);
                zombies.push(zombie);
            }
        }

        function createZombie(type, zData, x, z) {
            const g = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: zData.color, roughness: 0.7 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.2, 6), bodyMat);
            body.position.y = 1.2; body.castShadow = body.receiveShadow = true; g.add(body);
            
            if (type !== 'headless') {
                const headMat = new THREE.MeshStandardMaterial({ color: zData.color, roughness: 0.6 });
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), headMat);
                head.position.y = 2.2; head.castShadow = head.receiveShadow = true;
                head.userData.isH = true; g.add(head);
                
                if (type === 'regular' || type === 'bat' || type === 'redbull' || type === 'queen') {
                    const brain = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8), new THREE.MeshStandardMaterial({ color: 0xff8888, roughness: 0.3, emissive: new THREE.Color(0x552222), emissiveIntensity: 0.5 }));
                    brain.position.set(-0.25, 2.3, 0.4); g.add(brain);
                    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: new THREE.Color(0x440000), emissiveIntensity: 0.8 }));
                    eye.position.set(0.25, 2.3, 0.45); g.add(eye);
                }
                
                if (type === 'miner') {
                    const helmet = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.15, 8), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
                    helmet.position.y = 2.5; g.add(helmet);
                    const light = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6), new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: new THREE.Color(0x442200), emissiveIntensity: 1 }));
                    light.position.set(0, 2.55, 0.4); g.add(light);
                }
                
                if (type === 'queen') {
                    const crownBase = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.05, 8, 20), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: new THREE.Color(0x553300), emissiveIntensity: 0.3, metalness: 0.8, roughness: 0.3 }));
                    crownBase.rotation.x = Math.PI/2; crownBase.position.y = 2.55; g.add(crownBase);
                    for (let j = 0; j < 5; j++) {
                        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.25, 6), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.2 }));
                        spike.position.y = 2.7; spike.position.x = Math.sin(j * 1.256) * 0.35; spike.position.z = Math.cos(j * 1.256) * 0.35;
                        g.add(spike);
                    }
                    const jewel = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: new THREE.Color(0x440000), emissiveIntensity: 0.8 }));
                    jewel.position.y = 2.65; g.add(jewel);
                }
                
                if (type === 'redbull') {
                    const logo = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.1), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
                    logo.position.set(0, 1.5, 0.55); g.add(logo);
                }
            } else {
                const bloodSquirt = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.3, 6), new THREE.MeshStandardMaterial({ color: 0xaa0000, emissive: new THREE.Color(0x440000), emissiveIntensity: 0.8 }));
                bloodSquirt.position.y = 2.0; g.add(bloodSquirt);
            }
            
            if (type === 'metalPlated') {
                const armor = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.4, 0.8), new THREE.MeshStandardMaterial({ color: 0x778899, metalness: 0.7, roughness: 0.4 }));
                armor.position.y = 1.3; g.add(armor);
            }
            
            if (type === 'bat') {
                const bat = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.0, 6), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
                bat.rotation.z = 0.5; bat.position.set(0.7, 1.5, 0.3); g.add(bat);
            }
            
            const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.5, 6);
            const leftLeg = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({ color: type === 'regular' ? 0xeeeecc : zData.color }));
            leftLeg.position.set(-0.3, 0.3, 0); g.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({ color: zData.color }));
            rightLeg.position.set(0.3, 0.3, 0); g.add(rightLeg);
            
            const armGeo = new THREE.BoxGeometry(0.25, 0.9, 0.25);
            const lA = new THREE.Mesh(armGeo, new THREE.MeshStandardMaterial({ color: type === 'regular' ? 0xaa4444 : zData.color }));
            lA.position.set(-0.7, 1.4, 0.3); lA.rotation.x = 0.8; lA.rotation.z = 0.2; lA.castShadow = true; g.add(lA);
            const rA = new THREE.Mesh(armGeo, bodyMat);
            rA.position.set(0.7, 1.4, 0.3); rA.rotation.x = 0.8; rA.rotation.z = -0.2; rA.castShadow = true; g.add(rA);
            
            g.position.set(x, getH(x,z), z);
            scene.add(g);
            
            const obj = { 
                g, type, hp: zData.hp, 
                s: zData.speed * 3.0,
                damage: zData.damage,
                lastA: 0,
                leftArm: lA, rightArm: rA,
                isDead: false
            };
            g.children.forEach(child => { if (child.isMesh) child.userData.p = obj; });
            
            return obj;
        }

        // ============ GUN CREATION ============
        function createGun(id) {

            if (!weapon) return;
            
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8, roughness: 0.3 });
