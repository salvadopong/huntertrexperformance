<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HUNTER TREX - ULTIMATE EDITION</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Cinzel', serif;
            user-select: none;
        }
        #game-canvas { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none;
        }
        
        .menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(20,10,30,0.95) 100%);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
            text-align: center;
            overflow-y: auto;
        }
        .glory-panel {
            background: rgba(10,5,20,0.5);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 2px solid rgba(255,215,0,0.3);
            padding: 40px 60px;
            border-radius: 60px;
            box-shadow: 0 0 100px rgba(255,215,0,0.2), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,215,0,0.1);
            max-width: 1000px;
            position: relative;
            overflow: hidden;
            margin: 20px;
            animation: panelGlow 3s ease-in-out infinite alternate;
        }
        @keyframes panelGlow {
            0% { box-shadow: 0 0 80px rgba(255,215,0,0.15), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,215,0,0.05); border-color: rgba(255,215,0,0.2); }
            100% { box-shadow: 0 0 120px rgba(255,215,0,0.3), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 50px rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.5); }
        }
        .glory-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.1) 0%, transparent 50%);
            animation: rotate 25s linear infinite;
            pointer-events: none;
        }
        .glory-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,215,0,0.05) 50%, transparent 100%);
            pointer-events: none;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { 
            font-size: 90px; 
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 30%, #ffd700 60%, #ff8800 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0; letter-spacing: 15px; font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 50px rgba(255,215,0,0.5);
            position: relative;
            z-index: 2;
            animation: titleShine 4s ease-in-out infinite;
        }
        @keyframes titleShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .subtitle {
            font-size: 18px;
            letter-spacing: 8px;
            color: #ffd700;
            text-transform: uppercase;
            margin-top: 10px;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .btn {
            margin: 15px; padding: 18px 60px; font-size: 22px; font-weight: bold; 
            color: #fff; 
            background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(255,140,0,0.1) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.4); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border-radius: 50px;
            text-transform: uppercase; 
            letter-spacing: 5px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,215,0,0.1) inset;
            position: relative;
            z-index: 2;
        }
        .btn:hover { 
            background: linear-gradient(135deg, rgba(255,215,0,0.3) 0%, rgba(255,140,0,0.2) 100%);
            transform: scale(1.05); 
            box-shadow: 0 12px 48px rgba(255,215,0,0.3), 0 0 0 2px rgba(255,215,0,0.3) inset;
            border-color: rgba(255,215,0,0.8);
            letter-spacing: 8px;
        }
        .feature-list {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
            position: relative;
            z-index: 2;
        }
        .feature {
            text-align: center;
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 30px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.1);
        }
        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .feature-text {
            font-size: 12px;
            letter-spacing: 3px;
            color: #ffd700;
            text-transform: uppercase;
        }

        #fps-counter {
            position: absolute; top: 75px; left: 25px;
            color: #0f0; font-family: monospace; font-size: 11px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 5px 10px; 
            border-radius: 15px;
            pointer-events: none; 
            z-index: 200;
            border: 1px solid rgba(0,255,0,0.2);
        }

        .stat-box {
            position: absolute; 
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255,215,0,0.2); 
            border-radius: 20px;
            padding: 15px 20px; 
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #health-container { bottom: 25px; left: 25px; width: 260px; }
        #health-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 4px; margin-top: 8px; overflow: hidden; }
        #health-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4444, #ffaa00, #ff4444); background-size: 200% 100%; animation: healthPulse 2s ease infinite; transition: width 0.2s; }
        @keyframes healthPulse { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        #ammo-container { bottom: 25px; right: 25px; text-align: right; min-width: 150px; }
        #ammo-text { font-size: 46px; font-weight: 900; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        #score-board { top: 25px; left: 25px; min-width: 170px; }
        .score-val { font-size: 22px; font-weight: 900; color: #ffd700; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        #inventory {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px;
        }
        .slot {
            width: 55px; height: 55px; 
            background: rgba(20,20,35,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,0,0.25); 
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s; pointer-events: auto;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .slot.active { 
            border: 2px solid #ffd700; 
            background: rgba(255,215,0,0.15);
            transform: translateY(-6px); 
            box-shadow: 0 8px 24px rgba(255,215,0,0.2);
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 1.5px;
            width: 1.5px;
            height: 5px;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 1.5px;
            width: 1.5px;
            height: 5px;
            background: rgba(255,255,255,0.8);
        }
        #crosshair .left {
            position: absolute;
            top: 1.5px;
            left: -8px;
            width: 5px;
            height: 1.5px;
            background: rgba(255,255,255,0.8);
        }
        #crosshair .right {
            position: absolute;
            top: 1.5px;
            right: -8px;
            width: 5px;
            height: 1.5px;
            background: rgba(255,255,255,0.8);
        }

        #damage-nums { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .dmg-popup {
            position: absolute; color: #fff; font-weight: 900; font-size: 32px;
            text-shadow: 0 0 20px rgba(255,200,0,0.8), 0 0 40px rgba(255,100,0,0.5); 
            animation: dmgAnim 0.7s ease-out forwards;
        }
        .dmg-popup.headshot {
            color: #ffd700;
            text-shadow: 0 0 30px #ffaa00, 0 0 60px #ff8800, 0 0 100px #ff4400;
            font-size: 44px;
            animation: headshotAnim 0.9s ease-out forwards;
        }
        @keyframes dmgAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.4); }
            20% { opacity: 1; transform: translateY(-35px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-120px) scale(1); }
        }
        @keyframes headshotAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(-8deg); }
            15% { opacity: 1; transform: translateY(-45px) scale(1.6) rotate(4deg); }
            100% { opacity: 0; transform: translateY(-160px) scale(1) rotate(0deg); }
        }

        #sniper-scope {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; align-items: center; justify-content: center;
            background: transparent; z-index: 50; pointer-events: none;
        }
        #scope-lens {
            width: 80vh; height: 80vh; border: 4px solid rgba(0,0,0,0.8); border-radius: 50%;
            position: relative; overflow: hidden;
            box-shadow: 0 0 0 2000px #000, inset 0 0 40px rgba(0,0,0,0.9);
        }
        .scope-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1.5px; background: rgba(255,255,255,0.9); box-shadow: 0 0 8px #fff; }
        .scope-line-v { position: absolute; left: 50%; top: 0; width: 1.5px; height: 100%; background: rgba(255,255,255,0.9); box-shadow: 0 0 8px #fff; }

        #level-up-notif {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 70px; font-weight: 900; letter-spacing: 12px;
            opacity: 0; pointer-events: none; 
            text-shadow: 0 0 40px rgba(255,215,0,0.8), 0 0 80px rgba(255,165,0,0.5);
            z-index: 150; transition: opacity 0.4s;
        }

        #stats-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #ffd700;
            font-size: 13px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.2);
            pointer-events: none;
            z-index: 200;
        }

        #zombie-counter {
            position: absolute;
            top: 100px;
            right: 25px;
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,0,0,0.6);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 15px;
            border: 1px solid rgba(255,0,0,0.2);
            pointer-events: none;
            z-index: 200;
        }

        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            margin: 20px 0;
        }
        
        .weapon-card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .weapon-card:hover {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            transform: scale(1.02);
        }
        
        .weapon-card.selected {
            border: 2px solid #ffd700;
            background: rgba(255,215,0,0.2);
        }
        
        .weapon-name {
            font-size: 13px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .weapon-stats {
            font-size: 9px;
            color: #ccc;
        }
        
        .slot-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .slot-btn {
            width: 65px;
            height: 65px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        
        .slot-btn.active {
            border: 2px solid #ffd700;
            background: rgba(255,215,0,0.2);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="fps-counter">FPS: 0</div>
    <canvas id="game-canvas"></canvas>
    <div id="damage-nums"></div>
    <div id="level-up-notif">WAVE CLEARED</div>
    <div id="crosshair"><div class="left"></div><div class="right"></div></div>
    <div id="stats-panel"><div>⚔️ +<span id="dmg-bonus">0</span> DMG</div><div>📦 +<span id="mag-bonus">0</span> MAG</div><div>🧟 <span id="zombie-count">0</span> WAVE</div></div>
    <div id="zombie-counter">🧟 <span id="zombies-remaining">0</span> LEFT</div>

    <div id="start-menu" class="menu"><div class="glory-panel"><h1>HUNTER TREX</h1><div class="subtitle">ULTIMATE EDITION</div><div style="height:2px; background:linear-gradient(to right, transparent, rgba(255,215,0,0.6), transparent); margin:30px 0;"></div><div class="feature-list"><div class="feature"><div class="feature-icon">🎯</div><div class="feature-text">PRECISION</div></div><div class="feature"><div class="feature-icon">⚡</div><div class="feature-text">DYNAMIC</div></div><div class="feature"><div class="feature-icon">💀</div><div class="feature-text">ENDLESS</div></div></div><p style="color:#ddd; font-size:16px; letter-spacing:3px; margin:20px 0;"><span style="color:#ffd700;">+4 DMG & +5 MAG PER LEVEL</span></p><div style="height:2px; background:linear-gradient(to right, transparent, rgba(255,215,0,0.3), transparent); margin:25px 0;"></div><div style="display:flex; gap:25px; justify-content:center;"><button class="btn" id="play-btn">BEGIN HUNT</button><button class="btn" id="customize-btn">CUSTOMIZE</button></div></div></div>
    <div id="customize-menu" class="menu"><div class="glory-panel"><h1>CUSTOMIZE</h1><div class="slot-selector"><button class="slot-btn active" data-slot="0">1</button><button class="slot-btn" data-slot="1">2</button><button class="slot-btn" data-slot="2">3</button><button class="slot-btn" data-slot="3">4</button><button class="slot-btn" data-slot="4">5</button></div><div id="weapon-grid" class="weapon-grid"></div><button class="btn" id="save-loadout-btn">SAVE LOADOUT</button><button class="btn" id="back-btn">BACK</button></div></div>
    <div id="death-menu" class="menu" style="display:none;"><div class="glory-panel"><h1>FALLEN</h1><p id="final-stats" style="font-size:18px; color:#ffd700;"></p><button class="btn" onclick="location.reload()">RISE AGAIN</button></div></div>

    <div id="ui-layer">
        <div id="sniper-scope"><div id="scope-lens"><div class="scope-line-h"></div><div class="scope-line-v"></div></div></div>
        <div id="score-board" class="stat-box"><div style="font-size:9px; opacity:0.6; letter-spacing:1px;">LEVEL <span id="lvl-display">1</span></div><div class="score-val" id="score-display">00000</div></div>
        <div id="health-container" class="stat-box"><div style="font-size:9px; letter-spacing:2px; opacity:0.6;">VITALITY</div><div id="health-text" style="font-size:24px; font-weight:900;">300</div><div id="health-bar-bg"><div id="health-bar-fill"></div></div></div>
        <div id="ammo-container" class="stat-box"><div id="weapon-name" style="font-size:9px; letter-spacing:2px; opacity:0.6;">ASSAULT RIFLE</div><div id="ammo-text">35</div></div>
        <div id="inventory"><div class="slot active" id="slot-0">1</div><div class="slot" id="slot-1">2</div><div class="slot" id="slot-2">3</div><div class="slot" id="slot-3">4</div><div class="slot" id="slot-4">5</div></div>

    <audio id="sound-eas" preload="auto"><source src="eas.mp3" type="audio/mp3"></audio>
    <audio id="sound-crowd" preload="auto" loop><source src="crowd.mp3" type="audio/mp3"></audio>
    <audio id="sound-police" preload="auto" loop><source src="police.mp3" type="audio/mp3"></audio>
    <audio id="sound-easround" preload="auto"><source src="easround.mp3" type="audio/mp3"></audio>
    <audio id="sound-ar" preload="auto"><source src="ar.mp3" type="audio/mp3"></audio>
    <audio id="sound-smg" preload="auto"><source src="smg.mp3" type="audio/mp3"></audio>
    <audio id="sound-sniper" preload="auto"><source src="sniper.mp3" type="audio/mp3"></audio>
    <audio id="sound-pistol" preload="auto"><source src="pistol.mp3" type="audio/mp3"></audio>
    <audio id="sound-reload" preload="auto"><source src="reload.mp3" type="audio/mp3"></audio>
    <audio id="sound-hit" preload="auto"><source src="hit.mp3" type="audio/mp3"></audio>
    <audio id="sound-energy" preload="auto"><source src="ar.mp3" type="audio/mp3"></audio>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';

        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

        const sounds = { eas:document.getElementById('sound-eas'), crowd:document.getElementById('sound-crowd'), police:document.getElementById('sound-police'), easround:document.getElementById('sound-easround'), ar:document.getElementById('sound-ar'), smg:document.getElementById('sound-smg'), sniper:document.getElementById('sound-sniper'), pistol:document.getElementById('sound-pistol'), reload:document.getElementById('sound-reload'), hit:document.getElementById('sound-hit'), energy:document.getElementById('sound-energy') };
        function playSound(s){ if(sounds[s]){ sounds[s].currentTime=0; sounds[s].play().catch(e=>{}); } }
        function stopSound(s){ if(sounds[s]){ sounds[s].pause(); sounds[s].currentTime=0; } }

        const WEAPONS = {
            assaultRifle: { id:'assaultRifle', name:'Assault Rifle', mag:35, rate:133, reload:1500, dmg:45, dmgH:80, zoom:45, auto:true, sound:'ar' },

            energyRifle: { id:'energyRifle', name:'Energy Rifle', mag:10, rate:320, reload:2100, dmg:125, dmgH:205, zoom:35, auto:false, sound:'energy' }
        };

        const ZOMBIE_TYPES = { regular:{ hp:200, speed:1.5, damage:1, color:0x2a3a1a }, headless:{ hp:150, speed:1.5, damage:1, color:0x1a2a0a }, miner:{ hp:300, speed:1.3, damage:1, color:0x3a4a2a }, bat:{ hp:200, speed:1.5, damage:2, color:0x4a3a2a }, metalPlated:{ hp:400, speed:1.0, damage:2, color:0x556677 }, redbull:{ hp:200, speed:3.0, damage:1, color:0xcc3333 }, queen:{ hp:500, speed:1.2, damage:1.5, color:0xaa8800 } };
        const CONFIG = { player:{ health:300, walkSpeed:5, height:1.8, gravity:85.0, jumpForce:30 }, worldSize:400 };
        
        let scene, camera, renderer, controls, composer, clock=new THREE.Clock();
        let fpsCounter=document.getElementById('fps-counter'), frameCount=0, lastTime=0;
        let velocity=new THREE.Vector3(), direction=new THREE.Vector3(), moveF=false, moveB=false, moveL=false, moveR=false, isFiring=false, canJump=false;
        let isRunning=false, hp=300, activeSlot=0, loadout=['assaultRifle','smg','syringe','trexSniper','medkit'], ammo={}, reloading=false, lastFire=0, isAiming=false, twinMagState={}, healing=false, healInterval=null, usedHeals={};
        let level=1, score=0, zombiesRemaining=0, damageBonus=0, magBonus=0;
        const gunGroup=new THREE.Group(), zombies=[], deadZombies=[], raycaster=new THREE.Raycaster();
        let walkBob=0, zombieAnimTime=0, isReloadAnimating=false, tempVec=new THREE.Vector3();
        let currentBackdropIndex=0;
        const backdrops = [];

        function createBackdrop(index){
            const group = new THREE.Group();
            const groundMat = new THREE.MeshStandardMaterial({ color:0x2a3a25, roughness:0.6 });
            const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(800,800), groundMat);
            groundPlane.rotation.x = -Math.PI/2;
            groundPlane.receiveShadow = true;
            group.add(groundPlane);
            if(index===0){ const water = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0x2288aa, roughness:0.1, metalness:0.9 })); water.rotation.x=-Math.PI/2; water.position.y=0.1; group.add(water); }
            else if(index===1){ const lava = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0xff4400, emissive:0x442200 })); lava.rotation.x=-Math.PI/2; group.add(lava); }
            else if(index===2){ const snow = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0xeeeeff, roughness:0.9 })); snow.rotation.x=-Math.PI/2; group.add(snow); }
            else if(index===3){ const concrete = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0x556677, roughness:0.4 })); concrete.rotation.x=-Math.PI/2; group.add(concrete); }
            else if(index===4){ const desert = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0xc2b280, roughness:0.7 })); desert.rotation.x=-Math.PI/2; group.add(desert); }
            else if(index===5){ const cyber = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0x224466, emissive:0x001133 })); cyber.rotation.x=-Math.PI/2; group.add(cyber); }
            else if(index===6){ const alien = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0x7733aa, roughness:0.3 })); alien.rotation.x=-Math.PI/2; group.add(alien); }
            else if(index===7){ const blood = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0x441111, roughness:0.5 })); blood.rotation.x=-Math.PI/2; group.add(blood); }
            else if(index===8){ const gold = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0xccaa44, metalness:0.8 })); gold.rotation.x=-Math.PI/2; group.add(gold); }
            else{ const dark = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ color:0x111122, roughness:0.2 })); dark.rotation.x=-Math.PI/2; group.add(dark); }
            return group;
        }
        function switchBackdrop(){
            if(backdrops.length){ const old=scene.getObjectByName('backdrop'); if(old) scene.remove(old); }
            const newBack = createBackdrop(currentBackdropIndex);
            newBack.name='backdrop';
            scene.add(newBack);
            currentBackdropIndex = (currentBackdropIndex+1)%10;
        }

        function init(){
            renderer=new THREE.WebGLRenderer({ canvas:document.getElementById('game-canvas'), antialias:true, powerPreference:"high-performance" });
            renderer.setSize(window.innerWidth,window.innerHeight); renderer.setPixelRatio(1.2); renderer.shadowMap.enabled=true;
            scene=new THREE.Scene(); scene.background=new THREE.Color(0x1a2a3a); scene.fog=new THREE.FogExp2(0x1a2a3a,0.0012);
            camera=new THREE.PerspectiveCamera(85,window.innerWidth/window.innerHeight,0.1,2000);
            controls=new PointerLockControls(camera,document.body); scene.add(controls.getObject());
            const renderScene=new RenderPass(scene,camera); const bloomPass=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.4,0.25,0.7); const smaaPass=new SMAAPass(window.innerWidth,window.innerHeight);
            composer=new EffectComposer(renderer); composer.addPass(renderScene); composer.addPass(bloomPass); composer.addPass(smaaPass);
            const sun=new THREE.DirectionalLight(0xffeedd,6.0); sun.position.set(80,180,40); sun.castShadow=true; scene.add(sun);
            scene.add(new THREE.AmbientLight(0x6080a0,2.5)); scene.add(new THREE.HemisphereLight(0x88aacc,0x665544,2.8));
            switchBackdrop();
            spawnWave(); createGun(loadout[activeSlot]); setupUI(); setupControls();
            animate();
        }
        function setupUI(){
            document.getElementById('play-btn').addEventListener('click',()=>{ document.getElementById('start-menu').style.display='none'; playSound('eas'); sounds.eas.onended=()=>{ if(!isRunning){ playSound('crowd'); playSound('police'); } }; controls.lock(); });
            document.getElementById('customize-btn').addEventListener('click',()=>{ document.getElementById('start-menu').style.display='none'; document.getElementById('customize-menu').style.display='flex'; renderWeaponGrid(); });
            document.getElementById('back-btn').addEventListener('click',()=>{ document.getElementById('customize-menu').style.display='none'; document.getElementById('start-menu').style.display='flex'; });
            document.getElementById('save-loadout-btn').addEventListener('click',()=>{ localStorage.setItem('trex_loadout',JSON.stringify(loadout)); alert('Loadout saved!'); });
            const saved = localStorage.getItem('trex_loadout'); if(saved) loadout=JSON.parse(saved);
            document.querySelectorAll('.slot-btn').forEach((btn,i)=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.slot-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); activeSlot=i; renderWeaponGrid(); }); });
            controls.addEventListener('lock',()=>{ document.getElementById('ui-layer').style.display='block'; isRunning=true; updateUI(); });
            controls.addEventListener('unlock',()=>{ isRunning=false; stopSound('crowd'); stopSound('police'); });
        }
        function renderWeaponGrid(){
            const grid=document.getElementById('weapon-grid'); grid.innerHTML='';
            Object.entries(WEAPONS).forEach(([id,weapon])=>{ const card=document.createElement('div'); card.className='weapon-card'+(loadout[activeSlot]===id?' selected':''); card.innerHTML=`<div class="weapon-name">${weapon.name}</div><div class="weapon-stats">${weapon.dmg?`💥 ${weapon.dmg}/${weapon.dmgH}`:'💊 Heal'}<br>📦 ${weapon.mag}</div>`; card.addEventListener('click',()=>{ loadout[activeSlot]=id; if(activeSlot===0)switchWep(0); renderWeaponGrid(); updateSlotDisplay(); }); grid.appendChild(card); });
        }
        function updateSlotDisplay(){ for(let i=0;i<5;i++)document.getElementById(`slot-${i}`).innerHTML=i+1; }
        function setupControls(){
            document.addEventListener('keydown',(e)=>{ if(e.code==='KeyW')moveF=true; if(e.code==='KeyS')moveB=true; if(e.code==='KeyA')moveL=true; if(e.code==='KeyD')moveR=true; if(e.code==='Space'&&canJump){velocity.y+=CONFIG.player.jumpForce; canJump=false;} if(e.code==='Digit1')switchWep(0); if(e.code==='Digit2')switchWep(1); if(e.code==='Digit3')switchWep(2); if(e.code==='Digit4')switchWep(3); if(e.code==='Digit5')switchWep(4); if(e.code==='KeyR')reload(); });
            document.addEventListener('keyup',(e)=>{ if(e.code==='KeyW')moveF=false; if(e.code==='KeyS')moveB=false; if(e.code==='KeyA')moveL=false; if(e.code==='KeyD')moveR=false; });
            document.addEventListener('mousedown',(e)=>{ if(!isRunning)return; if(e.button===0)isFiring=true; if(e.button===2)setAim(true); });
            document.addEventListener('mouseup',(e)=>{ if(e.button===0)isFiring=false; if(e.button===2)setAim(false); });
            document.addEventListener('contextmenu',e=>e.preventDefault()); window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); composer.setSize(window.innerWidth,window.innerHeight); });
        }
        function createGun(id){
            while(gunGroup.children.length)gunGroup.remove(gunGroup.children[0]);
            const w=WEAPONS[id]; if(!w)return;
            const mat=new THREE.MeshStandardMaterial({ color:0x1a1a1a, metalness:0.8 });
            if(id==='energyRifle'){
                const body=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.16,0.8),new THREE.MeshStandardMaterial({ color:0x33ccff, emissive:0x1166aa }));
                body.position.set(0.3,-0.32,-0.6); gunGroup.add(body);
                const coil=new THREE.Mesh(new THREE.TorusGeometry(0.05,0.02,16,32),new THREE.MeshStandardMaterial({ color:0x00ffff, emissive:0x00aaaa }));
                coil.position.set(0.3,-0.25,-0.9); gunGroup.add(coil);
            } else if(id==='scopedRevolver'){
                const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.6,8),mat); cyl.rotation.z=Math.PI/2; cyl.position.set(0.25,-0.28,-0.5); gunGroup.add(cyl);
                const scopeRing=new THREE.Mesh(new THREE.TorusGeometry(0.045,0.01,8,32),new THREE.MeshStandardMaterial({ color:0xddbb55 })); scopeRing.position.set(0.25,-0.15,-0.55); gunGroup.add(scopeRing);
            } else if(id==='tripleSniper'){
                const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,1.2,12),mat); barrel.rotation.x=Math.PI/2; barrel.position.set(0.3,-0.3,-1.1); gunGroup.add(barrel);
                const digitalHolo=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.08,0.05),new THREE.MeshStandardMaterial({ color:0xff00ff, emissive:0x440044 })); digitalHolo.position.set(0.3,-0.2,-0.7); gunGroup.add(digitalHolo);
            } else {
                const rec=new THREE.Mesh(new THREE.BoxGeometry(0.11,0.16,0.7),mat); rec.position.set(0.3,-0.32,-0.55); gunGroup.add(rec);
                const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.85,10),mat); barrel.rotation.x=Math.PI/2; barrel.position.set(0.3,-0.3,-0.95); gunGroup.add(barrel);
            }
            camera.add(gunGroup);
        }
        function setAim(a){
            const w=WEAPONS[loadout[activeSlot]]; if(w.heal)return; isAiming=a;
            camera.fov=a?w.zoom:85; camera.updateProjectionMatrix();
            document.getElementById('crosshair').style.opacity=(w.scope&&a)?'0':'1';
            document.getElementById('sniper-scope').style.display=(w.scope&&a)?'flex':'none';
            gunGroup.visible=!(w.scope&&a);
        }
        function switchWep(slot){
            if(reloading)return; activeSlot=slot; const id=loadout[slot]; createGun(id); setAim(false);
            document.querySelectorAll('.slot').forEach((s,i)=>s.classList.toggle('active',i===slot));
            const w=WEAPONS[id]; document.getElementById('weapon-name').innerText=w.name;
            if(w.heal) document.getElementById('ammo-text').innerText=usedHeals[id]?'0':'1';
            else document.getElementById('ammo-text').innerText=ammo[id]||0;
            if(healing){ clearInterval(healInterval); healing=false; }
        }
        function fire(){
            if(reloading||isReloadAnimating)return;
            const id=loadout[activeSlot]; const w=WEAPONS[id];
            if(w.heal){ if(usedHeals[id])return; if(w.healPerSec){ if(!healing){ healing=true; usedHeals[id]=true; healInterval=setInterval(()=>{ if(hp<300){ hp=Math.min(300,hp+w.heal); updateUI(); } else{ clearInterval(healInterval); healing=false; ammo[id]=0; updateUI(); } },1000); ammo[id]=0; updateUI(); } } else{ if(hp<300){ hp=Math.min(300,hp+w.heal); usedHeals[id]=true; ammo[id]=0; updateUI(); } } return; }
            const now=performance.now(); if(now-lastFire<w.rate||ammo[id]<=0)return;
            lastFire=now; ammo[id]--; updateUI(); if(w.sound)playSound(w.sound);
            gunGroup.position.z=0.05; setTimeout(()=>gunGroup.position.z=0,50);
            const flashLight=new THREE.PointLight(0xffaa66,2,5); flashLight.position.set(0.3,-0.3,-0.8); camera.add(flashLight); setTimeout(()=>camera.remove(flashLight),50);
            raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
            const hits=raycaster.intersectObjects(scene.children,true);
            if(hits.length>0){
                const h=hits[0]; const zObj=h.object.userData.p;
                if(zObj&&!zObj.isDead){
                    const isHead=h.object.userData.isH;
                    const totalDmg=(isHead?w.dmgH:w.dmg)+damageBonus;
                    zObj.hp-=totalDmg; score+=10; popDmg(totalDmg,h.point,isHead);
                    if(zObj.hp<=0){ zObj.isDead=true; const idx=zombies.indexOf(zObj); if(idx>-1){ zombies.splice(idx,1); zombiesRemaining--; score+=100; document.getElementById('zombies-remaining').innerText=zombiesRemaining; } ragdollDeath(zObj); if(zombiesRemaining<=0)levelUp(); }
                    updateUI();
                }
            }
            if(w.twinMag&&ammo[id]===0){ const state=twinMagState[id]; if(state&&state.activeMag===1){ state.activeMag=2; ammo[id]=w.mag2; updateUI(); } else reload(); }
            else if(ammo[id]===0)reload();
        }
        function ragdollDeath(z){ /* keep original ragdoll */ const g=z.g; g.children.forEach(c=>{ if(c.isMesh)c.material=new THREE.MeshStandardMaterial({ color:0x555555 }); }); setTimeout(()=>scene.remove(g),1000); }
        function levelUp(){
            level++; damageBonus+=4; if(!WEAPONS[loadout[activeSlot]]?.scope)magBonus+=5;
            playSound('easround'); hp=300;
            loadout.forEach(id=>{ const w=WEAPONS[id]; if(w){ if(w.heal){ ammo[id]=1; usedHeals[id]=false; } else ammo[id]=w.mag+(w.scope?0:magBonus); if(w.twinMag)twinMagState[id]={ activeMag:1 }; } });
            usedHeals={}; if(healing){ clearInterval(healInterval); healing=false; }
            document.getElementById('dmg-bonus').innerText=damageBonus; document.getElementById('mag-bonus').innerText=magBonus;
            const notif=document.getElementById('level-up-notif'); notif.style.opacity='1'; notif.innerHTML=`WAVE ${level} CLEARED<br><span style="font-size:22px;">+4 DMG | +5 MAG</span>`;
            setTimeout(()=>{ notif.style.opacity='0'; switchBackdrop(); spawnWave(); updateUI(); },1800);
            updateUI();
        }
        function reload(){
            if(reloading)return; const id=loadout[activeSlot]; const w=WEAPONS[id]; if(w.heal)return;
            reloading=true; isReloadAnimating=true; document.getElementById('ammo-text').innerText='...'; playSound('reload');
            let rt=w.reload; if(id==='hyperPistol')rt*=0.833; if(id==='drumSMG')rt*=1.6; if(id==='rushedSMG')rt*=0.87;
            setTimeout(()=>{ ammo[id]=w.mag+(w.scope?0:magBonus); reloading=false; isReloadAnimating=false; updateUI(); },rt);
        }
        function spawnWave(){
            zombies.forEach(z=>scene.remove(z.g)); deadZombies.forEach(z=>scene.remove(z.g)); zombies.length=0; deadZombies.length=0;
            const count=30+(level-1)*10; zombiesRemaining=count;
            document.getElementById('zombie-count').innerText=count; document.getElementById('zombies-remaining').innerText=count;
            const types=Object.keys(ZOMBIE_TYPES);
            for(let i=0;i<count;i++){
                const type=types[Math.floor(Math.random()*types.length)]; const zData=ZOMBIE_TYPES[type];
                const angle=Math.random()*Math.PI*2; const dist=60+Math.random()*140; const x=Math.cos(angle)*dist, z=Math.sin(angle)*dist;
                const zombie=createZombie(type,zData,x,z); zombies.push(zombie);
            }
        }
        function createZombie(type,zData,x,z){
            const g=new THREE.Group(); const bodyMat=new THREE.MeshStandardMaterial({ color:zData.color, roughness:0.7 });
            const body=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,1.2,6),bodyMat); body.position.y=1.2; g.add(body);
            if(type!=='headless'){
                const head=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),bodyMat); head.position.y=2.2; head.userData.isH=true; g.add(head);
                if(type==='queen'){
                    const crownBase=new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.5,0.2,8),new THREE.MeshStandardMaterial({ color:0xffd700, metalness:0.9 }));
                    crownBase.position.y=2.6; g.add(crownBase);
                    for(let i=0;i<5;i++){ const spike=new THREE.Mesh(new THREE.ConeGeometry(0.08,0.25,4),new THREE.MeshStandardMaterial({ color:0xffaa00 })); spike.position.set(Math.sin(i*1.256)*0.4,2.75,Math.cos(i*1.256)*0.4); g.add(spike); }
                }
            }
            g.position.set(x,0,z); scene.add(g);
            return { g, type, hp:zData.hp, s:zData.speed*3.0, damage:zData.damage, lastA:0, isDead:false };
        }
        function popDmg(d,p,isHead){ const v=p.project(camera); const x=(v.x*0.5+0.5)*window.innerWidth; const y=(v.y*-0.5+0.5)*window.innerHeight; const el=document.createElement('div'); el.className=isHead?'dmg-popup headshot':'dmg-popup'; el.style.left=`${x}px`; el.style.top=`${y}px`; el.innerText=Math.round(d); if(isHead)el.innerHTML=`💀 ${Math.round(d)}`; document.getElementById('damage-nums').appendChild(el); setTimeout(()=>el.remove(),isHead?800:600); }
        function updateUI(){
            const id=loadout[activeSlot]; const w=WEAPONS[id];
            if(!w.heal)document.getElementById('ammo-text').innerText=ammo[id]||0; else document.getElementById('ammo-text').innerText=usedHeals[id]?'0':'1';
            document.getElementById('health-text').innerText=Math.ceil(hp); document.getElementById('health-bar-fill').style.width=`${(hp/300)*100}%`;
            document.getElementById('score-display').innerText=score.toString().padStart(5,'0'); document.getElementById('lvl-display').innerText=level; document.getElementById('zombies-remaining').innerText=zombiesRemaining;
            if(hp<=0){ isRunning=false; stopSound('crowd'); stopSound('police'); document.getElementById('final-stats').innerHTML=`LEVEL ${level} | SCORE ${score}`; document.getElementById('death-menu').style.display='flex'; controls.unlock(); if(healing)clearInterval(healInterval); }
        }
        function initializeAmmo(){
            loadout.forEach(id=>{ const w=WEAPONS[id]; if(w){ ammo[id]=w.mag+(w.scope?0:magBonus); if(w.twinMag)twinMagState[id]={ activeMag:1 }; } });
            usedHeals={}; if(healing){ clearInterval(healInterval); healing=false; }
        }
        function animate(){
            requestAnimationFrame(animate);
            const dt=Math.min(clock.getDelta(),0.1); const now=performance.now(); zombieAnimTime+=dt;
            frameCount++; if(now>lastTime+1000){ fpsCounter.innerText=`FPS: ${frameCount}`; frameCount=0; lastTime=now; }
            if(isRunning){
                const id=loadout[activeSlot]; const w=WEAPONS[id];
                if(isFiring&&!reloading&&!isReloadAnimating){ if(w.auto)fire(); else if(!w.auto&&now-lastFire>w.rate){ fire(); isFiring=false; } }
                velocity.x-=velocity.x*10.0*dt; velocity.z-=velocity.z*10.0*dt; velocity.y-=CONFIG.player.gravity*dt;
                direction.z=Number(moveF)-Number(moveB); direction.x=Number(moveR)-Number(moveL); direction.normalize();
                const speed=CONFIG.player.walkSpeed; if(moveF||moveB)velocity.z-=direction.z*speed*10*dt; if(moveL||moveR)velocity.x-=direction.x*speed*10*dt;
                controls.moveRight(-velocity.x*dt); controls.moveForward(-velocity.z*dt); controls.getObject().position.y+=(velocity.y*dt);
                const pos=controls.getObject().position; const limit=390; if(Math.abs(pos.x)>limit)pos.x=Math.sign(pos.x)*limit; if(Math.abs(pos.z)>limit)pos.z=Math.sign(pos.z)*limit;
                const groundY=0+CONFIG.player.height; if(pos.y<groundY){ velocity.y=0; controls.getObject().position.y=groundY; canJump=true; }
                const pPos=controls.getObject().position;
                for(let i=0;i<zombies.length;i++){ const z=zombies[i]; if(!z||!z.g||z.isDead)continue;
                    tempVec.copy(pPos).sub(z.g.position); tempVec.y=0; const dist=tempVec.length();
                    if(dist>1.5){ tempVec.normalize().multiplyScalar(z.s*dt); z.g.position.add(tempVec); z.g.lookAt(pPos.x,z.g.position.y,pPos.z); }
                    else if(now-z.lastA>800){ hp-=(12+level*2)*(z.damage||1); z.lastA=now; updateUI(); }
                }
                const isMoving=Math.abs(velocity.x)>0.1||Math.abs(velocity.z)>0.1; if(isMoving&&canJump)walkBob+=dt*6; else walkBob=0;
                if(!isReloadAnimating)gunGroup.position.y=-0.25+Math.sin(walkBob)*0.01;
            }
            composer.render();
        }
        init();
        updateSlotDisplay();
        initializeAmmo();
    </script>
</body>
</html>
