<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNTER TREX - MASSIVE UPDATE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Cinzel', serif;
            user-select: none;
        }
        #game-canvas { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none;
        }
        
        .menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
            text-align: center;
            overflow-y: auto;
        }
        .glory-panel {
            background: rgba(15,15,25,0.35);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(200,180,100,0.2);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(200,180,100,0.08) inset;
            max-width: 900px;
            position: relative;
            overflow: hidden;
            margin: 20px;
        }
        .glory-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(200,180,100,0.06) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { 
            font-size: 70px; 
            background: linear-gradient(to bottom, #ffd700 0%, #ffaa00 50%, #cc8800 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0; letter-spacing: 10px; font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255,215,0,0.25);
            position: relative;
            z-index: 2;
        }
        .subtitle {
            font-size: 14px;
            letter-spacing: 5px;
            color: #ccc;
            text-transform: uppercase;
            margin-top: 5px;
            position: relative;
            z-index: 2;
        }
        .btn {
            margin: 10px; padding: 15px 40px; font-size: 18px; font-weight: bold; 
            color: #fff; 
            background: rgba(200,180,100,0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(200,180,100,0.35); 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border-radius: 40px;
            text-transform: uppercase; 
            letter-spacing: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            position: relative;
            z-index: 2;
        }
        .btn:hover { 
            background: rgba(255,215,0,0.18); 
            transform: scale(1.03); 
            box-shadow: 0 6px 24px rgba(255,215,0,0.25);
            border-color: rgba(255,215,0,0.6);
        }

        #customize-menu {
            display: none;
        }
        
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin: 20px 0;
        }
        
        .weapon-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(200,180,100,0.2);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        
        .weapon-card:hover {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            transform: scale(1.02);
        }
        
        .weapon-card.selected {
            border: 2px solid #ffd700;
            background: rgba(255,215,0,0.2);
        }
        
        .weapon-name {
            font-size: 12px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .weapon-stats {
            font-size: 9px;
            color: #aaa;
        }
        
        .slot-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .slot-btn {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(200,180,100,0.3);
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .slot-btn.active {
            border: 2px solid #ffd700;
            background: rgba(255,215,0,0.2);
        }

        #fps-counter {
            position: absolute; top: 12px; right: 16px;
            color: #0f0; font-family: monospace; font-size: 12px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            padding: 5px 10px; 
            border-radius: 16px;
            pointer-events: none; 
            z-index: 200;
        }

        .stat-box {
            position: absolute; 
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(200,180,100,0.15); 
            border-radius: 16px;
            padding: 14px 18px; 
            color: white;
        }
        #health-container { bottom: 25px; left: 25px; width: 240px; }
        #health-bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-top: 6px; overflow: hidden; }
        #health-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4444, #ffaa00); transition: width 0.2s; }

        #ammo-container { bottom: 25px; right: 25px; text-align: right; min-width: 140px; }
        #ammo-text { font-size: 42px; font-weight: 900; line-height: 1; }

        #score-board { top: 25px; left: 25px; min-width: 160px; }
        .score-val { font-size: 20px; font-weight: 900; color: #ffd700; }

        #inventory {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px;
        }
        .slot {
            width: 50px; height: 50px; 
            background: rgba(15,15,25,0.45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200,180,100,0.2); 
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.15s; pointer-events: auto;
            font-weight: bold;
            font-size: 14px;
        }
        .slot.active { 
            border: 1px solid #ffd700; 
            background: rgba(255,215,0,0.12);
            transform: translateY(-5px); 
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 1px;
            width: 1.5px;
            height: 4px;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 1px;
            width: 1.5px;
            height: 4px;
            background: rgba(255,255,255,0.8);
        }
        #crosshair .left {
            position: absolute;
            top: 1px;
            left: -6px;
            width: 4px;
            height: 1.5px;
            background: rgba(255,255,255,0.8);
        }
        #crosshair .right {
            position: absolute;
            top: 1px;
            right: -6px;
            width: 4px;
            height: 1.5px;
            background: rgba(255,255,255,0.8);
        }

        #damage-nums { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .dmg-popup {
            position: absolute; color: #fff; font-weight: 900; font-size: 30px;
            text-shadow: 0 0 16px rgba(255,200,0,0.7), 0 0 32px rgba(255,100,0,0.4); 
            animation: dmgAnim 0.6s ease-out forwards;
        }
        .dmg-popup.headshot {
            color: #ffd700;
            text-shadow: 0 0 24px #ffaa00, 0 0 48px #ff8800, 0 0 80px #ff4400;
            font-size: 40px;
            animation: headshotAnim 0.8s ease-out forwards;
        }
        @keyframes dmgAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.4); }
            20% { opacity: 1; transform: translateY(-30px) scale(1.15); }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
        @keyframes headshotAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(-6deg); }
            15% { opacity: 1; transform: translateY(-40px) scale(1.5) rotate(3deg); }
            100% { opacity: 0; transform: translateY(-150px) scale(1) rotate(0deg); }
        }

        #sniper-scope {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; align-items: center; justify-content: center;
            background: transparent; z-index: 50; pointer-events: none;
        }
        #scope-lens {
            width: 80vh; height: 80vh; border: 3px solid rgba(0,0,0,0.7); border-radius: 50%;
            position: relative; overflow: hidden;
            box-shadow: 0 0 0 2000px #000, inset 0 0 30px rgba(0,0,0,0.8);
        }
        .scope-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.85); }
        .scope-line-v { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.85); }

        #level-up-notif {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 60px; font-weight: 900; letter-spacing: 10px;
            opacity: 0; pointer-events: none; 
            text-shadow: 0 0 30px rgba(255,215,0,0.7);
            z-index: 150; transition: opacity 0.3s;
        }

        #stats-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #ffd700;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 14px;
            border: 1px solid rgba(200,180,100,0.15);
            pointer-events: none;
            z-index: 200;
        }

        #death-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(100,0,0,0.35) 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(6px);
            pointer-events: none;
            z-index: 300;
            display: none;
        }

        #zombie-counter {
            position: absolute;
            top: 95px;
            right: 25px;
            color: #ff4444;
            font-size: 13px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,0,0,0.15);
            pointer-events: none;
            z-index: 200;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="fps-counter">FPS: 0</div>
    <canvas id="game-canvas"></canvas>
    <div id="damage-nums"></div>
    <div id="level-up-notif">WAVE CLEARED</div>
    <div id="death-overlay"></div>
    
    <div id="crosshair">
        <div class="left"></div>
        <div class="right"></div>
    </div>

    <div id="stats-panel">
        <div>⚔️ +<span id="dmg-bonus">0</span> DMG</div>
        <div>📦 +<span id="mag-bonus">0</span> MAG</div>
        <div>🧟 <span id="zombie-count">0</span> WAVE</div>
    </div>

    <div id="zombie-counter">
        🧟 <span id="zombies-remaining">0</span> LEFT
    </div>

    <div id="start-menu" class="menu">
        <div class="glory-panel">
            <h1>HUNTER TREX</h1>
            <div class="subtitle">MASSIVE UPDATE</div>
            <div style="height: 1px; background: linear-gradient(to right, transparent, rgba(200,180,100,0.3), transparent); margin: 25px 0;"></div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button class="btn" id="play-btn">BEGIN HUNT</button>
                <button class="btn" id="customize-btn">CUSTOMIZE</button>
            </div>
        </div>
    </div>

    <div id="customize-menu" class="menu">
        <div class="glory-panel">
            <h1>CUSTOMIZE</h1>
            <div class="slot-selector">
                <button class="slot-btn active" data-slot="0">1</button>
                <button class="slot-btn" data-slot="1">2</button>
                <button class="slot-btn" data-slot="2">3</button>
                <button class="slot-btn" data-slot="3">4</button>
                <button class="slot-btn" data-slot="4">5</button>
            </div>
            <div id="weapon-grid" class="weapon-grid"></div>
            <button class="btn" id="back-btn">BACK</button>
        </div>
    </div>

    <div id="death-menu" class="menu" style="display: none;">
        <div class="glory-panel">
            <h1>FALLEN</h1>
            <p id="final-stats" style="font-size: 16px; color: #ffd700;"></p>
            <button class="btn" onclick="location.reload()">RISE AGAIN</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="sniper-scope">
            <div id="scope-lens">
                <div class="scope-line-h"></div>
                <div class="scope-line-v"></div>
            </div>
        </div>

        <div id="score-board" class="stat-box">
            <div style="font-size: 8px; opacity: 0.5;">LEVEL <span id="lvl-display">1</span></div>
            <div class="score-val" id="score-display">00000</div>
        </div>
        
        <div id="health-container" class="stat-box">
            <div style="font-size: 8px; opacity: 0.5;">VITALITY</div>
            <div id="health-text" style="font-size: 22px; font-weight: 900;">300</div>
            <div id="health-bar-bg"><div id="health-bar-fill"></div></div>
        </div>

        <div id="ammo-container" class="stat-box">
            <div id="weapon-name" style="font-size: 8px; opacity: 0.5;">PISTOL</div>
            <div id="ammo-text">43</div>
        </div>

        <div id="inventory">
            <div class="slot active" id="slot-0">1</div>
            <div class="slot" id="slot-1">2</div>
            <div class="slot" id="slot-2">3</div>
            <div class="slot" id="slot-3">4</div>
            <div class="slot" id="slot-4">5</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

        // WEAPON DATABASE
        const WEAPONS = {
            pistol: { id: 'pistol', name: 'Pistol', mag: 43, rate: 80, reload: 1200, dmg: 45, dmgH: 75, zoom: 50, auto: false, semi: true },
            scopedRevolver: { id: 'scopedRevolver', name: 'Scoped Revolver', mag: 8, rate: 1000, reload: 2200, dmg: 102, dmgH: 203, zoom: 15, auto: false, semi: false, scope: true },
            medkit: { id: 'medkit', name: 'Medkit', mag: 1, rate: 0, reload: 0, dmg: 0, dmgH: 0, zoom: 75, auto: false, heal: 5, healPerSec: true },
            drumSMG: { id: 'drumSMG', name: 'Drum SMG', mag: 90, rate: 55, reload: 1800, dmg: 15, dmgH: 35, zoom: 55, auto: true },
            heavyAR: { id: 'heavyAR', name: 'Heavy AR', mag: 30, rate: 200, reload: 2000, dmg: 75, dmgH: 110, zoom: 45, auto: true },
            tripleSniper: { id: 'tripleSniper', name: 'Triple Action', mag: 3, rate: 800, reload: 2800, dmg: 100, dmgH: 300, zoom: 12, auto: false, scope: true },
            rushedSMG: { id: 'rushedSMG', name: 'Rushed SMG', mag: 60, rate: 30, reload: 1300, dmg: 10, dmgH: 25, zoom: 55, auto: true },
            twinMagAR: { id: 'twinMagAR', name: 'Twin Mag AR', mag: 40, mag2: 30, rate: 66, reload: 2500, dmg: 35, dmgH: 60, zoom: 45, auto: true, twinMag: true },
            semiSniper: { id: 'semiSniper', name: 'Semi-Auto Sniper', mag: 10, rate: 400, reload: 3000, dmg: 75, dmgH: 190, zoom: 12, auto: false, semi: true, scope: true },
            hyperPistol: { id: 'hyperPistol', name: 'Hyper Pistol', mag: 40, rate: 40, reload: 480, dmg: 15, dmgH: 25, zoom: 50, auto: false, semi: true },
            syringe: { id: 'syringe', name: 'Syringe', mag: 1, rate: 0, reload: 0, dmg: 0, dmgH: 0, zoom: 75, auto: false, heal: 50 }
        };

        const ZOMBIE_TYPES = {
            regular: { hp: 200, speed: 1.5, damage: 1, color: 0x2a3a1a },
            headless: { hp: 150, speed: 1.5, damage: 1, color: 0x1a2a0a },
            miner: { hp: 300, speed: 1.3, damage: 1, color: 0x3a4a2a },
            bat: { hp: 200, speed: 1.5, damage: 2, color: 0x4a3a2a },
            metalPlated: { hp: 400, speed: 1.0, damage: 2, color: 0x556677 },
            redbull: { hp: 200, speed: 3.0, damage: 1, color: 0xcc3333 },
            queen: { hp: 500, speed: 1.2, damage: 1.5, color: 0xaa8800 }
        };

        const CONFIG = {
            player: { health: 300, walkSpeed: 5, height: 1.8, gravity: 85.0, jumpForce: 30 },
            worldSize: 400
        };

        let scene, camera, renderer, controls, composer;
        let clock = new THREE.Clock();
        let fpsCounter = document.getElementById('fps-counter');
        let frameCount = 0, lastTime = 0;
        
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, isFiring = false, canJump = false;

        let isRunning = false;
        let hp = 300;
        let activeSlot = 0;
        let loadout = ['pistol', 'drumSMG', 'syringe', 'scopedRevolver', 'medkit'];
        let ammo = {};
        let reloading = false;
        let lastFire = 0;
        let isAiming = false;
        let twinMagState = { activeMag: 1 };
        let healing = false;
        let healInterval = null;

        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('trex_highscore') || 0;
        let zombiesRemaining = 0;
        
        let damageBonus = 0;
        let magBonus = 0;

        const gunGroup = new THREE.Group();
        const zombies = [];
        const raycaster = new THREE.Raycaster();
        
        const originalWeapons = JSON.parse(JSON.stringify(WEAPONS));

        let walkBob = 0;
        let zombieAnimTime = 0;

        const tempVec = new THREE.Vector3();

        init();

        function init() {
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('game-canvas'), 
                antialias: true, 
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1.2);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.8;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a3a);
            scene.fog = new THREE.FogExp2(0x1a2a3a, 0.0012);

            camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 2000);
            controls = new PointerLockControls(camera, document.body);
            scene.add(controls.getObject());

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.25, 0.7);
            const smaaPass = new SMAAPass(window.innerWidth, window.innerHeight);
            
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(smaaPass);

            const sun = new THREE.DirectionalLight(0xffeedd, 6.0);
            sun.position.set(80, 180, 40);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 400;
            sun.shadow.camera.left = -150;
            sun.shadow.camera.right = 150;
            sun.shadow.camera.top = 150;
            sun.shadow.camera.bottom = -150;
            scene.add(sun);
            
            scene.add(new THREE.PointLight(0x88aacc, 4.5, 0, 0, 0).position.set(-50, 30, -50));
            scene.add(new THREE.PointLight(0xccaa88, 4.0, 0, 0, 0).position.set(50, 20, 50));
            scene.add(new THREE.PointLight(0xaaccff, 3.5, 0, 0, 0).position.set(0, 40, 0));
            scene.add(new THREE.AmbientLight(0x6080a0, 2.5));
            scene.add(new THREE.HemisphereLight(0x88aacc, 0x665544, 2.8));

            createWorld();
            initializeAmmo();
            spawnWave();
            createGun(loadout[activeSlot]);

            setupUI();
            setupControls();

            animate();
        }

        function setupUI() {
            document.getElementById('play-btn').addEventListener('click', () => {
                document.getElementById('start-menu').style.display = 'none';
                controls.lock();
            });
            
            document.getElementById('customize-btn').addEventListener('click', () => {
                document.getElementById('start-menu').style.display = 'none';
                document.getElementById('customize-menu').style.display = 'flex';
                renderWeaponGrid();
            });
            
            document.getElementById('back-btn').addEventListener('click', () => {
                document.getElementById('customize-menu').style.display = 'none';
                document.getElementById('start-menu').style.display = 'flex';
            });
            
            document.querySelectorAll('.slot-btn').forEach((btn, i) => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeSlot = i;
                    renderWeaponGrid();
                });
            });
            
            controls.addEventListener('lock', () => {
                document.getElementById('ui-layer').style.display = 'block';
                isRunning = true;
                updateUI();
            });
            controls.addEventListener('unlock', () => isRunning = false);
        }

        function renderWeaponGrid() {
            const grid = document.getElementById('weapon-grid');
            grid.innerHTML = '';
            
            Object.entries(WEAPONS).forEach(([id, weapon]) => {
                const card = document.createElement('div');
                card.className = 'weapon-card' + (loadout[activeSlot] === id ? ' selected' : '');
                card.innerHTML = `
                    <div class="weapon-name">${weapon.name}</div>
                    <div class="weapon-stats">
                        ${weapon.dmg ? `💥 ${weapon.dmg}/${weapon.dmgH}` : '💊 Heal'}<br>
                        📦 ${weapon.mag} | 🔫 ${weapon.auto ? 'Auto' : weapon.semi ? 'Semi' : 'Single'}
                    </div>
                `;
                card.addEventListener('click', () => {
                    loadout[activeSlot] = id;
                    if (activeSlot === 0) {
                        activeSlot = 0;
                        switchWep(0);
                    }
                    renderWeaponGrid();
                    updateSlotDisplay();
                });
                grid.appendChild(card);
            });
        }

        function updateSlotDisplay() {
            for (let i = 0; i < 5; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const weapon = WEAPONS[loadout[i]];
                slot.innerHTML = weapon ? weapon.name.substring(0, 2) : (i + 1);
            }
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') moveF = true;
                if (e.code === 'KeyS') moveB = true;
                if (e.code === 'KeyA') moveL = true;
                if (e.code === 'KeyD') moveR = true;
                if (e.code === 'Space' && canJump) { velocity.y += CONFIG.player.jumpForce; canJump = false; }
                if (e.code === 'Digit1') switchWep(0);
                if (e.code === 'Digit2') switchWep(1);
                if (e.code === 'Digit3') switchWep(2);
                if (e.code === 'Digit4') switchWep(3);
                if (e.code === 'Digit5') switchWep(4);
                if (e.code === 'KeyR') reload();
            });
            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') moveF = false;
                if (e.code === 'KeyS') moveB = false;
                if (e.code === 'KeyA') moveL = false;
                if (e.code === 'KeyD') moveR = false;
            });
            document.addEventListener('mousedown', (e) => {
                if (!isRunning) return;
                if (e.button === 0) isFiring = true;
                if (e.button === 2) setAim(true);
            });
            document.addEventListener('mouseup', (e) => {
                if (e.button === 0) isFiring = false;
                if (e.button === 2) setAim(false);
            });
            document.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('resize', onResize);
        }

        function createWorld() {
            const geo = new THREE.PlaneGeometry(800, 800, 128, 128);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position.array;
            for (let i = 0; i < pos.length; i += 3) {
                pos[i+1] = Math.sin(pos[i]*0.012) * Math.cos(pos[i+2]*0.012) * 6 + Math.sin(pos[i]*0.04) * Math.cos(pos[i+2]*0.04) * 1.5;
            }
            geo.computeVertexNormals();
            
            const mat = new THREE.MeshStandardMaterial({ color: 0x2a3a25, roughness: 0.6, metalness: 0.08, envMapIntensity: 0.6 });
            const ground = new THREE.Mesh(geo, mat);
            ground.receiveShadow = true;
            scene.add(ground);

            const grassGeo = new THREE.PlaneGeometry(0.15, 0.5);
            grassGeo.translate(0, 0.25, 0);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x2a4a1a, side: THREE.DoubleSide, roughness: 0.4, metalness: 0.15, emissive: new THREE.Color(0x1a3a0a), emissiveIntensity: 0.3, envMapIntensity: 1.0 });
            const instanced = new THREE.InstancedMesh(grassGeo, grassMat, 50000);
            const dummy = new THREE.Object3D();
            let instanceCount = 0;
            for (let i = 0; i < 50000; i++) {
                const x = (Math.random() - 0.5) * 760;
                const z = (Math.random() - 0.5) * 760;
                if (Math.abs(x) > 390 || Math.abs(z) > 390) continue;
                dummy.position.set(x, getH(x,z), z);
                dummy.rotation.y = Math.random() * Math.PI;
                dummy.scale.setScalar(0.5 + Math.random() * 0.5);
                dummy.updateMatrix();
                instanced.setMatrixAt(instanceCount++, dummy.matrix);
            }
            instanced.count = instanceCount;
            instanced.castShadow = true;
            instanced.receiveShadow = true;
            scene.add(instanced);

            for(let i=0; i<10; i++) {
                let x, z;
                do { x = (Math.random() - 0.5) * 700; z = (Math.random() - 0.5) * 700; }
                while (Math.abs(x) > 380 || Math.abs(z) > 380);
                createHouse(x, z);
            }
            
            for(let i=0; i<30; i++) {
                let x, z;
                do { x = (Math.random() - 0.5) * 750; z = (Math.random() - 0.5) * 750; }
                while (Math.abs(x) > 380 || Math.abs(z) > 380);
                createTree(x, z);
            }
        }

        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 10, 5), new THREE.MeshStandardMaterial({ color: 0x5a4530, roughness: 0.8 }));
            trunk.position.y = 5;
            trunk.castShadow = trunk.receiveShadow = true;
            group.add(trunk);
            
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x1a4a1a, roughness: 0.5 });
            const leaves1 = new THREE.Mesh(new THREE.ConeGeometry(4, 7, 5), leafMat);
            leaves1.position.y = 10;
            leaves1.castShadow = leaves1.receiveShadow = true;
            group.add(leaves1);
            
            const leaves2 = new THREE.Mesh(new THREE.ConeGeometry(3, 5, 5), leafMat);
            leaves2.position.y = 14;
            leaves2.castShadow = leaves2.receiveShadow = true;
            group.add(leaves2);
            
            group.position.set(x, getH(x,z), z);
            scene.add(group);
        }

        function createHouse(x, z) {
            const h = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 12), new THREE.MeshStandardMaterial({ color: 0x3a3a40, roughness: 0.6 }));
            body.position.y = 4;
            body.castShadow = body.receiveShadow = true;
            
            const roof = new THREE.Mesh(new THREE.ConeGeometry(10, 5, 4), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.8 }));
            roof.position.y = 10.5;
            roof.rotation.y = Math.PI/4;
            roof.castShadow = roof.receiveShadow = true;
            
            h.add(body, roof);
            h.position.set(x, getH(x,z), z);
            h.castShadow = h.receiveShadow = true;
            scene.add(h);
        }

        function getH(x, z) {
            return Math.sin(x*0.012) * Math.cos(z*0.012) * 6 + Math.sin(x*0.04) * Math.cos(z*0.04) * 1.5;
        }

        function initializeAmmo() {
            loadout.forEach(id => {
                const w = WEAPONS[id];
                if (w) ammo[id] = w.mag;
            });
        }

        function spawnWave() {
            const baseCount = 25;
            const count = baseCount + (level - 1) * 3;
            zombiesRemaining = count;
            
            document.getElementById('zombie-count').innerText = count;
            document.getElementById('zombies-remaining').innerText = count;
            
            const types = Object.keys(ZOMBIE_TYPES);
            
            for (let i = 0; i < count; i++) {
                const type = types[Math.floor(Math.random() * Math.min(types.length, 1 + Math.floor(level / 2)))];
                const zData = ZOMBIE_TYPES[type];
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 140;
                const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
                
                const g = new THREE.Group();
                
                const bodyMat = new THREE.MeshStandardMaterial({ color: zData.color, roughness: 0.7 });
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.2, 6), bodyMat);
                body.position.y = 1.2;
                body.castShadow = body.receiveShadow = true;
                
                // Create zombie based on type
                if (type !== 'headless') {
                    const headMat = new THREE.MeshStandardMaterial({ color: zData.color, roughness: 0.6 });
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), headMat);
                    head.position.y = 2.2;
                    head.castShadow = head.receiveShadow = true;
                    head.userData.isH = true;
                    g.add(head);
                    
                    // Brain exposed (regular zombie)
                    if (type === 'regular' || type === 'bat' || type === 'redbull' || type === 'queen') {
                        const brain = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6), new THREE.MeshStandardMaterial({ color: 0xffaaaa, emissive: new THREE.Color(0x552222), emissiveIntensity: 0.5 }));
                        brain.position.set(0.2, 2.3, 0.4);
                        g.add(brain);
                    }
                    
                    // Miner helmet
                    if (type === 'miner') {
                        const helmet = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.15, 8), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
                        helmet.position.y = 2.5;
                        g.add(helmet);
                        const light = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6), new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: new THREE.Color(0x442200), emissiveIntensity: 1 }));
                        light.position.set(0, 2.55, 0.4);
                        g.add(light);
                    }
                    
                    // Crown for queen
                    if (type === 'queen') {
                        const crown = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: new THREE.Color(0x553300), emissiveIntensity: 0.5 }));
                        crown.position.y = 2.6;
                        g.add(crown);
                    }
                    
                    // Red Bull logo
                    if (type === 'redbull') {
                        const logo = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.1), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
                        logo.position.set(0, 1.5, 0.55);
                        g.add(logo);
                    }
                }
                
                // Iron armor for metal plated
                if (type === 'metalPlated') {
                    const armor = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.4, 0.8), new THREE.MeshStandardMaterial({ color: 0x778899, metalness: 0.7, roughness: 0.4 }));
                    armor.position.y = 1.3;
                    g.add(armor);
                }
                
                // Bat for bat zombie
                if (type === 'bat') {
                    const bat = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.0, 6), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
                    bat.rotation.z = 0.5;
                    bat.position.set(0.7, 1.5, 0.3);
                    g.add(bat);
                }
                
                // Bone leg for regular zombie
                if (type === 'regular' || type === 'bat' || type === 'redbull') {
                    const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0xeeeecc }));
                    bone.position.set(-0.3, 0.3, 0);
                    g.add(bone);
                }
                
                // Arms
                const armGeo = new THREE.BoxGeometry(0.25, 0.9, 0.25);
                const lA = new THREE.Mesh(armGeo, bodyMat);
                lA.position.set(-0.7, 1.4, 0.3);
                lA.rotation.x = 0.8;
                lA.rotation.z = 0.2;
                lA.castShadow = true;
                g.add(lA);
                
                const rA = new THREE.Mesh(armGeo, bodyMat);
                rA.position.set(0.7, 1.4, 0.3);
                rA.rotation.x = 0.8;
                rA.rotation.z = -0.2;
                rA.castShadow = true;
                g.add(rA);
                
                g.add(body);
                g.position.set(x, getH(x,z), z);
                scene.add(g);
                
                const obj = { 
                    g, type, hp: zData.hp, 
                    s: zData.speed * 3.0,
                    damage: zData.damage,
                    lastA: 0,
                    leftArm: lA,
                    rightArm: rA
                };
                g.children.forEach(child => { if (child.isMesh) child.userData.p = obj; });
                zombies.push(obj);
            }
        }

        function createGun(id) {
            while(gunGroup.children.length > 0) gunGroup.remove(gunGroup.children[0]);
            
            const weapon = WEAPONS[id];
            if (!weapon) return;
            
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8, roughness: 0.3 });
            
            if (weapon.heal) {
                // Medkit/Syringe model
                const kit = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: weapon.id === 'medkit' ? 0x44aaff : 0xccccdd }));
                kit.position.set(0.25, -0.25, -0.5);
                gunGroup.add(kit);
                if (weapon.id === 'medkit') {
                    const cross = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.05, 0.02), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                    cross.position.set(0.25, -0.25, -0.3);
                    gunGroup.add(cross);
                    const cross2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.02), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                    cross2.position.set(0.25, -0.25, -0.3);
                    gunGroup.add(cross2);
                }
            } else {
                const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.18, 0.7), gunMat);
                receiver.position.set(0.3, -0.32, -0.5);
                gunGroup.add(receiver);
                
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.9, 10), gunMat);
                barrel.rotation.x = Math.PI/2;
                barrel.position.set(0.3, -0.3, -0.9);
                gunGroup.add(barrel);
                
                if (weapon.scope) {
                    const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2, 8), gunMat);
                    scope.rotation.z = Math.PI/2;
                    scope.position.set(0.3, -0.15, -0.45);
                    gunGroup.add(scope);
                }
                
                if (weapon.twinMag) {
                    const mag1 = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.2, 0.12), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                    mag1.position.set(0.3, -0.38, -0.45);
                    gunGroup.add(mag1);
                    const mag2 = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.2, 0.12), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    mag2.position.set(0.4, -0.38, -0.45);
                    gunGroup.add(mag2);
                } else {
                    const mag = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.25, 0.12), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                    mag.position.set(0.3, -0.42, -0.45);
                    gunGroup.add(mag);
                }
            }
            
            camera.add(gunGroup);
        }

        function switchWep(slot) {
            if (reloading) return;
            activeSlot = slot;
            const id = loadout[slot];
            createGun(id);
            setAim(false);
            
            document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === slot));
            
            const weapon = WEAPONS[id];
            document.getElementById('weapon-name').innerText = weapon.name;
            document.getElementById('ammo-text').innerText = weapon.heal ? '∞' : ammo[id];
            
            // Stop healing when switching
            if (healing) {
                clearInterval(healInterval);
                healing = false;
            }
        }

        function setAim(a) {
            const weapon = WEAPONS[loadout[activeSlot]];
            if (weapon.heal) return;
            isAiming = a;
            camera.fov = a ? weapon.zoom : 85;
            camera.updateProjectionMatrix();
            
            document.getElementById('crosshair').style.opacity = (weapon.scope && a) ? '0' : '1';
            
            if (weapon.scope) {
                document.getElementById('sniper-scope').style.display = a ? 'flex' : 'none';
                gunGroup.visible = !a;
            } else {
                gunGroup.position.x = a ? -0.35 : 0;
                gunGroup.position.y = a ? 0.05 : 0;
            }
        }

        function fire() {
            if (reloading) return;
            
            const id = loadout[activeSlot];
            const weapon = WEAPONS[id];
            
            if (weapon.heal) {
                if (weapon.healPerSec) {
                    if (!healing) {
                        healing = true;
                        healInterval = setInterval(() => {
                            if (hp < 300) {
                                hp = Math.min(300, hp + weapon.heal);
                                updateUI();
                            } else {
                                clearInterval(healInterval);
                                healing = false;
                                ammo[id] = 0;
                                updateUI();
                            }
                        }, 1000);
                        ammo[id] = 0;
                        updateUI();
                    }
                } else if (ammo[id] > 0 && hp < 300) {
                    hp = Math.min(300, hp + weapon.heal);
                    ammo[id]--;
                    updateUI();
                }
                return;
            }
            
            const now = performance.now();
            
            if (now - lastFire < weapon.rate || ammo[id] <= 0) return;

            lastFire = now;
            ammo[id]--;
            updateUI();

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(scene.children, true);
            if (hits.length > 0) {
                const h = hits[0];
                if (h.object.userData.p) {
                    const z = h.object.userData.p;
                    const isHeadshot = h.object.userData.isH;
                    
                    const totalDmg = (isHeadshot ? weapon.dmgH : weapon.dmg) + damageBonus;
                    
                    z.hp -= totalDmg;
                    score += 10;
                    popDmg(totalDmg, h.point, isHeadshot);
                    
                    if (z.hp <= 0) {
                        scene.remove(z.g);
                        zombies.splice(zombies.indexOf(z), 1);
                        zombiesRemaining--;
                        score += 100;
                        document.getElementById('zombies-remaining').innerText = zombiesRemaining;
                        if (zombiesRemaining <= 0) levelUp();
                    }
                    updateUI();
                }
            }
            
            // Twin mag handling
            if (weapon.twinMag && ammo[id] === 0) {
                if (twinMagState.activeMag === 1) {
                    twinMagState.activeMag = 2;
                    ammo[id] = weapon.mag2;
                    updateUI();
                } else {
                    reload();
                }
            } else if (ammo[id] === 0) {
                reload();
            }
        }

        function levelUp() {
            level++;
            damageBonus += 2;
            if (loadout[activeSlot] !== 'scopedRevolver' && !WEAPONS[loadout[activeSlot]].scope) {
                magBonus += 5;
            }
            
            hp = 300;
            
            // Reset ammo and medkits
            loadout.forEach(id => {
                const w = WEAPONS[id];
                if (w && !w.heal) {
                    ammo[id] = (w.mag + (id.includes('scoped') || id.includes('Sniper') ? 0 : magBonus));
                } else if (w && w.id === 'syringe') {
                    ammo[id] = 1;
                } else if (w && w.id === 'medkit') {
                    ammo[id] = 1;
                }
            });
            
            twinMagState = { activeMag: 1 };
            
            if (healing) {
                clearInterval(healInterval);
                healing = false;
            }
            
            document.getElementById('dmg-bonus').innerText = damageBonus;
            document.getElementById('mag-bonus').innerText = magBonus;
            
            const notif = document.getElementById('level-up-notif');
            notif.style.opacity = '1';
            notif.innerHTML = `WAVE ${level} CLEARED<br><span style="font-size: 22px;">+2 DMG | +5 MAG</span>`;
            
            setTimeout(() => { 
                notif.style.opacity = '0'; 
                spawnWave(); 
            }, 1800);
            updateUI();
        }

        function popDmg(d, p, isHeadshot = false) {
            const v = p.project(camera);
            const x = (v.x * 0.5 + 0.5) * window.innerWidth;
            const y = (v.y * -0.5 + 0.5) * window.innerHeight;
            const el = document.createElement('div');
            el.className = isHeadshot ? 'dmg-popup headshot' : 'dmg-popup';
            el.style.left = `${x}px`; 
            el.style.top = `${y}px`;
            el.innerText = Math.round(d);
            if (isHeadshot) el.innerHTML = `💀 ${Math.round(d)}`;
            document.getElementById('damage-nums').appendChild(el);
            setTimeout(() => el.remove(), isHeadshot ? 800 : 600);
        }

        function reload() {
            if (reloading) return;
            const id = loadout[activeSlot];
            const weapon = WEAPONS[id];
            if (weapon.heal) return;
            
            reloading = true;
            document.getElementById('ammo-text').innerText = '...';
            
            let reloadTime = weapon.reload;
            if (weapon.scope) reloadTime *= 1.5;
            if (weapon.id === 'hyperPistol') reloadTime = weapon.reload / 2.5;
            if (weapon.twinMag && twinMagState.activeMag === 2) reloadTime = weapon.reload * 2;
            
            setTimeout(() => {
                if (weapon.twinMag) {
                    twinMagState.activeMag = 1;
                    ammo[id] = weapon.mag + (id.includes('scoped') ? 0 : magBonus);
                } else {
                    ammo[id] = weapon.mag + (id.includes('scoped') || id.includes('Sniper') ? 0 : magBonus);
                }
                reloading = false;
                updateUI();
            }, reloadTime);
        }

        function updateUI() {
            const id = loadout[activeSlot];
            const weapon = WEAPONS[id];
            
            if (!weapon.heal) {
                document.getElementById('ammo-text').innerText = ammo[id] || 0;
            } else {
                document.getElementById('ammo-text').innerText = ammo[id] || 0;
            }
            
            document.getElementById('health-text').innerText = Math.ceil(hp);
            document.getElementById('health-bar-fill').style.width = `${(hp / 300) * 100}%`;
            document.getElementById('score-display').innerText = score.toString().padStart(5, '0');
            document.getElementById('lvl-display').innerText = level;
            document.getElementById('zombies-remaining').innerText = zombiesRemaining;
            
            if (hp <= 0) { 
                isRunning = false;
                document.getElementById('death-overlay').style.display = 'block';
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem('trex_highscore', score);
                }
                document.getElementById('final-stats').innerHTML = `LEVEL ${level} | SCORE ${score}`;
                setTimeout(() => document.getElementById('death-menu').style.display = 'flex', 1200);
                controls.unlock();
                if (healing) clearInterval(healInterval);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const now = performance.now();
            zombieAnimTime += dt;

            frameCount++;
            if (now > lastTime + 1000) {
                fpsCounter.innerText = `FPS: ${frameCount}`;
                frameCount = 0; 
                lastTime = now;
            }

            if (isRunning) {
                const id = loadout[activeSlot];
                const weapon = WEAPONS[id];
                
                if (isFiring) {
                    if (weapon.auto || weapon.semi) {
                        fire();
                        if (weapon.semi) isFiring = false;
                    } else if (!weapon.auto && !weapon.semi && now - lastFire > weapon.rate) {
                        fire();
                        isFiring = false;
                    }
                }

                velocity.x -= velocity.x * 10.0 * dt;
                velocity.z -= velocity.z * 10.0 * dt;
                velocity.y -= CONFIG.player.gravity * dt;

                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                const speed = CONFIG.player.walkSpeed;
                if (moveF || moveB) velocity.z -= direction.z * speed * 10 * dt;
                if (moveL || moveR) velocity.x -= direction.x * speed * 10 * dt;

                controls.moveRight(-velocity.x * dt);
                controls.moveForward(-velocity.z * dt);
                controls.getObject().position.y += (velocity.y * dt);

                const pos = controls.getObject().position;
                const limit = 390;
                if (Math.abs(pos.x) > limit) pos.x = Math.sign(pos.x) * limit;
                if (Math.abs(pos.z) > limit) pos.z = Math.sign(pos.z) * limit;

                const groundY = getH(pos.x, pos.z) + CONFIG.player.height;
                if (pos.y < groundY) {
                    velocity.y = 0;
                    controls.getObject().position.y = groundY;
                    canJump = true;
                }

                const pPos = controls.getObject().position;
                for (let i = zombies.length - 1; i >= 0; i--) {
                    const z = zombies[i];
                    tempVec.copy(pPos).sub(z.g.position);
                    tempVec.y = 0;
                    const dist = tempVec.length();
                    
                    if (z.leftArm && z.rightArm) {
                        z.leftArm.rotation.x = 0.8 + Math.sin(zombieAnimTime * 6) * 0.3;
                        z.rightArm.rotation.x = 0.8 + Math.cos(zombieAnimTime * 6) * 0.3;
                    }
                    
                    if (dist > 1.5) {
                        tempVec.normalize().multiplyScalar(z.s * dt);
                        z.g.position.add(tempVec);
                        z.g.lookAt(pPos.x, z.g.position.y, pPos.z);
                        z.g.position.y = getH(z.g.position.x, z.g.position.z);
                    } else if (now - z.lastA > 800) {
                        hp -= (12 + level * 2) * (z.damage || 1);
                        z.lastA = now; 
                        updateUI();
                    }
                }

                const isMoving = Math.abs(velocity.x) > 0.1 || Math.abs(velocity.z) > 0.1;
                if (isMoving && canJump) walkBob += dt * 6;
                else walkBob = 0;
                
                const bobY = Math.sin(walkBob) * 0.01;
                
                if (!isAiming || (weapon && weapon.scope)) {
                    gunGroup.position.y = -0.25 + bobY;
                    gunGroup.position.x = 0.3;
                }
            }
            composer.render();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize
        updateSlotDisplay();
    </script>
</body>
</html>
