                const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.16, 0.7), gunMat);
                receiver.position.set(0.3, -0.32, -0.55); gunGroup.add(receiver);
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.85, 10), gunMat);
                barrel.rotation.x = Math.PI/2; barrel.position.set(0.3, -0.3, -0.95); gunGroup.add(barrel);
                const stock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.4), new THREE.MeshStandardMaterial({ color: 0x5a4030 }));
                stock.position.set(0.3, -0.3, -0.2); gunGroup.add(stock);
                if (id === 'twinMagAR') {
                    const mag1 = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.2, 0.12), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                    mag1.position.set(0.3, -0.4, -0.5); gunGroup.add(mag1);
                    const mag2 = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.2, 0.12), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    mag2.position.set(0.4, -0.4, -0.5); gunGroup.add(mag2);
                } else {
                    const mag = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.22, 0.12), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                    mag.position.set(0.3, -0.42, -0.5); gunGroup.add(mag);
                }
                if (id === 'heavyAR') {
                    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.15, 0.1), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    grip.position.set(0.3, -0.42, -0.3); gunGroup.add(grip);
                }
            } else if (id.includes('Sniper') || id === 'trexSniper') {
                const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.14, 0.9), gunMat);
                receiver.position.set(0.3, -0.32, -0.6); gunGroup.add(receiver);
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.016, 1.1, 12), gunMat);
                barrel.rotation.x = Math.PI/2; barrel.position.set(0.3, -0.3, -1.1); gunGroup.add(barrel);
                const stock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.5), new THREE.MeshStandardMaterial({ color: 0x5a4030 }));
                stock.position.set(0.3, -0.3, -0.15); gunGroup.add(stock);
                if (id === 'tripleSniper') {
                    const scope = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.3), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 }));
                    scope.position.set(0.3, -0.15, -0.55); gunGroup.add(scope);
                    const lens1 = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: new THREE.Color(0x442200), emissiveIntensity: 0.3 }));
                    lens1.position.set(0.3, -0.15, -0.4); gunGroup.add(lens1);
                    const lens2 = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: new THREE.Color(0x442200), emissiveIntensity: 0.3 }));
                    lens2.position.set(0.3, -0.15, -0.7); gunGroup.add(lens2);
                } else {
                    const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.25, 10), gunMat);
                    scope.rotation.z = Math.PI/2; scope.position.set(0.3, -0.15, -0.55); gunGroup.add(scope);
                }
                const mag = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.1), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                mag.position.set(0.3, -0.38, -0.65); gunGroup.add(mag);
            }
            
            camera.add(gunGroup);
        }

        // ============ UI SETUP ============
        function setupUI() {
            document.getElementById('play-btn').addEventListener('click', () => {
                document.getElementById('start-menu').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                if (!gameStarted) {
                    gameStarted = true;
                    spawnWave();
                }
                controls.lock();
            });
            
            document.getElementById('customize-btn').addEventListener('click', () => {
                document.getElementById('start-menu').style.display = 'none';
                document.getElementById('customize-menu').style.display = 'flex';
                renderWeaponGrid();
            });
            
            document.getElementById('save-btn').addEventListener('click', () => {
                localStorage.setItem('trex_loadout', JSON.stringify(loadout));
                alert('Loadout Saved!');
            });
            
            document.getElementById('back-btn').addEventListener('click', () => {
                document.getElementById('customize-menu').style.display = 'none';
                document.getElementById('start-menu').style.display = 'flex';
            });
            
            document.querySelectorAll('.slot-btn').forEach((btn, i) => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeSlot = i;
                    renderWeaponGrid();
                });
            });
            
            controls.addEventListener('lock', () => {
                isRunning = true;
                updateUI();
            });
            
            controls.addEventListener('unlock', () => {
                isRunning = false;
                stopSound('crowd');
                stopSound('police');
                backgroundMusicPlaying = false;
                if (hp > 0) {
                    document.getElementById('ui-layer').style.display = 'none';
                    document.getElementById('start-menu').style.display = 'flex';
                }
            });
        }

        function renderWeaponGrid() {
            const grid = document.getElementById('weapon-grid');
            grid.innerHTML = '';
            
            Object.entries(WEAPONS).forEach(([id, weapon]) => {
                const card = document.createElement('div');
                card.className = 'weapon-card' + (loadout[activeSlot] === id ? ' selected' : '');
                card.innerHTML = `
                    <div class="weapon-name">${weapon.name}</div>
                    <div class="weapon-stats">
                        ${weapon.dmg ? `💥 ${weapon.dmg}/${weapon.dmgH}` : '💊 Heal'}<br>
                        📦 ${weapon.mag} | ${weapon.auto ? 'Auto' : 'Single'}
                    </div>
                `;
                card.addEventListener('click', () => {
                    loadout[activeSlot] = id;
                    if (activeSlot === 0) {
                        activeSlot = 0;
                        switchWep(0);
                    }
                    renderWeaponGrid();
                    updateSlotDisplay();
                });
                grid.appendChild(card);
            });
        }

        function updateSlotDisplay() {
            for (let i = 0; i < 5; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (slot) slot.innerHTML = i + 1;
            }
        }

        // ============ CONTROLS ============
        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (!isRunning) return;
                if (e.code === 'KeyW') moveF = true;
                if (e.code === 'KeyS') moveB = true;
                if (e.code === 'KeyA') moveL = true;
                if (e.code === 'KeyD') moveR = true;
                if (e.code === 'Space' && canJump) { velocity.y += CONFIG.player.jumpForce; canJump = false; }
                if (e.code === 'Digit1') switchWep(0);
                if (e.code === 'Digit2') switchWep(1);
                if (e.code === 'Digit3') switchWep(2);
                if (e.code === 'Digit4') switchWep(3);
                if (e.code === 'Digit5') switchWep(4);
                if (e.code === 'KeyR') reload();
            });
            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') moveF = false;
                if (e.code === 'KeyS') moveB = false;
                if (e.code === 'KeyA') moveL = false;
                if (e.code === 'KeyD') moveR = false;
            });
            document.addEventListener('mousedown', (e) => {
                if (!isRunning) return;
                if (e.button === 0) isFiring = true;
                if (e.button === 2) setAim(true);
            });
            document.addEventListener('mouseup', (e) => {
                if (e.button === 0) isFiring = false;
                if (e.button === 2) setAim(false);
            });
            document.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('resize', onResize);
        }

        function switchWep(slot) {
            if (reloading) return;
            activeSlot = slot;
            const id = loadout[slot];
            createGun(id);
            setAim(false);
            
            document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === slot));
            
            const weapon = WEAPONS[id];
            document.getElementById('weapon-name').innerText = weapon.name;
            document.getElementById('ammo-text').innerText = weapon.heal ? (usedHeals[id] ? '0' : '1') : (ammo[id] || weapon.mag);
            
            if (healing) {
                clearInterval(healInterval);
                healing = false;
            }
        }

        function setAim(a) {
            const weapon = WEAPONS[loadout[activeSlot]];
            if (!weapon || weapon.heal) return;
            isAiming = a;
            camera.fov = a ? weapon.zoom : 85;
            camera.updateProjectionMatrix();
            
            document.getElementById('crosshair').style.opacity = (weapon.scope && a) ? '0' : '1';
            
            if (weapon.scope) {
                document.getElementById('sniper-scope').style.display = a ? 'flex' : 'none';
                gunGroup.visible = !a;
            }
        }

        // ============ COMBAT ============
        function fire() {
            if (reloading || isReloadAnimating || !isRunning) return;
            
            const id = loadout[activeSlot];
            const weapon = WEAPONS[id];
            
            if (weapon.heal) {
                if (usedHeals[id]) return;
                if (weapon.healPerSec) {
                    if (!healing) {
                        healing = true;
                        usedHeals[id] = true;
                        healInterval = setInterval(() => {
                            if (hp < 300) {
                                hp = Math.min(300, hp + weapon.heal);
                                updateUI();
                            } else {
                                clearInterval(healInterval);
                                healing = false;
                                ammo[id] = 0;
                                updateUI();
                            }
                        }, 1000);
                        ammo[id] = 0;
                        updateUI();
                    }
                } else {
                    if (hp < 300) {
                        hp = Math.min(300, hp + weapon.heal);
                        usedHeals[id] = true;
                        ammo[id] = 0;
                        updateUI();
                    }
                }
                return;
            }
            
            const now = performance.now();
            
            if (now - lastFire < weapon.rate || ammo[id] <= 0) return;

            lastFire = now;
            ammo[id]--;
            updateUI();
            
            if (weapon.sound) playSound(weapon.sound);
            
            // Muzzle flash
            muzzleFlashLight.intensity = 3;
            muzzleFlashMesh.material.opacity = 0.9;
            muzzleFlashMesh.scale.setScalar(1 + Math.random() * 0.5);
            setTimeout(() => {
                muzzleFlashLight.intensity = 0;
                muzzleFlashMesh.material.opacity = 0;
            }, 50);
            
            // Gun recoil
            gunGroup.position.z = 0.05;
            setTimeout(() => gunGroup.position.z = 0, 50);

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(scene.children, true);
            if (hits.length > 0) {
                const h = hits[0];
                const zombieObj = h.object.userData.p;
                
                if (zombieObj && !zombieObj.isDead) {
                    const isHeadshot = h.object.userData.isH;
                    const totalDmg = (isHeadshot ? weapon.dmgH : weapon.dmg) + damageBonus;
                    
                    zombieObj.hp -= totalDmg;
                    score += 10;
                    popDmg(totalDmg, h.point, isHeadshot);
                    
                    createBloodGoreEffect(h.point, isHeadshot);
                    playSound('hit');
                    
                    if (zombieObj.hp <= 0) {
                        zombieObj.isDead = true;
                        
                        const index = zombies.indexOf(zombieObj);
                        if (index > -1) {
                            zombies.splice(index, 1);
                            deadZombies.push(zombieObj);
                            zombiesRemaining--;
                            score += 100;
                            document.getElementById('zombies-remaining').innerText = zombiesRemaining;
                        }
                        
                        ragdollDeath(zombieObj);
                        
                        if (zombiesRemaining <= 0) levelUp();
                    }
                    updateUI();
                }
            }
            
            if (weapon.twinMag && ammo[id] === 0) {
                const state = twinMagState[id];
                if (state && state.activeMag === 1) {
                    state.activeMag = 2;
                    ammo[id] = weapon.mag2;
                    updateUI();
                } else {
                    reload();
                }
            } else if (ammo[id] === 0) {
                reload();
            }
        }

        function createBloodGoreEffect(position, isHeadshot) {
            const bloodColor = 0xaa0000;
            const goreColor = 0x880000;
            
            // Blood splatter on ground
            const bloodSplatter = new THREE.Mesh(new THREE.CircleGeometry(0.8, 8), new THREE.MeshStandardMaterial({ 
                color: bloodColor, transparent: true, opacity: 0.7, side: THREE.DoubleSide
            }));
            bloodSplatter.rotation.x = -Math.PI / 2;
            bloodSplatter.position.set(position.x, getH(position.x, position.z) + 0.05, position.z);
            scene.add(bloodSplatter);
            
            // Flying gore particles
            for (let i = 0; i < (isHeadshot ? 15 : 8); i++) {
                const gore = new THREE.Mesh(new THREE.SphereGeometry(0.08 + Math.random() * 0.1, 4), new THREE.MeshStandardMaterial({ 
                    color: i % 2 === 0 ? bloodColor : 0x660000,
                    emissive: isHeadshot ? new THREE.Color(0x440000) : new THREE.Color(0x220000),
                    emissiveIntensity: 0.3
                }));
                gore.position.set(
                    position.x + (Math.random() - 0.5) * 1.5,
                    getH(position.x, position.z) + 0.5 + Math.random() * 1.5,
                    position.z + (Math.random() - 0.5) * 1.5
                );
                gore.castShadow = true;
                scene.add(gore);
                
                const startY = gore.position.y;
                const fallSpeed = 0.01 + Math.random() * 0.02;
                const goreInterval = setInterval(() => {
                    gore.position.y -= fallSpeed;
                    if (gore.position.y < getH(gore.position.x, gore.position.z) + 0.1) {
                        clearInterval(goreInterval);
                        setTimeout(() => scene.remove(gore), 3000);
                    }
                }, 16);
            }
            
            // Blood spray droplets
            for (let i = 0; i < (isHeadshot ? 20 : 10); i++) {
                const droplet = new THREE.Mesh(new THREE.SphereGeometry(0.03 + Math.random() * 0.04, 3), new THREE.MeshStandardMaterial({ 
                    color: 0xcc0000, transparent: true, opacity: 0.8
                }));
                const angle = (i / (isHeadshot ? 20 : 10)) * Math.PI * 2;
                const spread = 0.8;
                droplet.position.set(
                    position.x + Math.cos(angle) * spread,
                    getH(position.x, position.z) + 0.8 + Math.random() * 0.8,
                    position.z + Math.sin(angle) * spread
                );
                scene.add(droplet);
                setTimeout(() => scene.remove(droplet), 2000);
            }
            
            // Headshot special effect
            if (isHeadshot) {
                const brainMatter = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({ 
                    color: 0xffaaaa, emissive: new THREE.Color(0x552222), emissiveIntensity: 0.5
                }));
                brainMatter.position.set(position.x, getH(position.x, position.z) + 1.0, position.z);
                scene.add(brainMatter);
                setTimeout(() => scene.remove(brainMatter), 1500);
            }
            
            setTimeout(() => scene.remove(bloodSplatter), 60000);
        }

        function ragdollDeath(z) {
            const g = z.g;
            const fallHeight = 0.5;
            const duration = 1000;
            const startTime = Date.now();
            const startY = g.position.y;
            
            g.children.forEach(child => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({ color: 0x555555 });
                    delete child.userData.p;
                }
            });
            
            const fallInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                g.position.y = startY - (progress * fallHeight);
                g.rotation.x = progress * 1.5;
                g.rotation.z = progress * 0.5;
                
                if (progress >= 1) {
                    clearInterval(fallInterval);
                    setTimeout(() => {
                        scene.remove(g);
                        const deadIndex = deadZombies.indexOf(z);
                        if (deadIndex > -1) deadZombies.splice(deadIndex, 1);
                    }, 1000);
                }
            }, 16);
        }

        function levelUp() {
            level++;
            damageBonus += 2;
            if (!WEAPONS[loadout[activeSlot]]?.scope) {
                magBonus += 5;
            }
            
            // Cycle backdrops
            currentBackdrop++;
            if (currentBackdrop >= BACKDROPS.length) {
                currentBackdrop = 0;
            }
            applyBackdrop(currentBackdrop);
            
            playSound('easround');
            
            hp = 300;
            
            loadout.forEach(id => {
                const w = WEAPONS[id];
                if (w) {
                    if (w.heal) {
                        ammo[id] = w.mag;
                        usedHeals[id] = false;
                    } else {
                        ammo[id] = w.mag + (w.scope ? 0 : magBonus);
                    }
                    if (w.twinMag) twinMagState[id] = { activeMag: 1 };
                }
            });
            
            Object.keys(WEAPONS).forEach(id => {
                const w = WEAPONS[id];
                if (!w.heal && ammo[id] === undefined) {
                    ammo[id] = w.mag + (w.scope ? 0 : magBonus);
                }
            });
            
            usedHeals = { syringe: false, medkit: false };
            
            if (healing) {
                clearInterval(healInterval);
                healing = false;
            }
            
            document.getElementById('dmg-bonus').innerText = damageBonus;
            document.getElementById('mag-bonus').innerText = magBonus;
            
            const notif = document.getElementById('level-up-notif');
            notif.style.opacity = '1';
            notif.innerHTML = `WAVE ${level} CLEARED<br><span style="font-size: 22px;">${BACKDROPS[currentBackdrop % BACKDROPS.length].name}</span>`;
            
            setTimeout(() => { 
                notif.style.opacity = '0'; 
                spawnWave();
                updateUI();
            }, 1800);
            updateUI();
        }

        function popDmg(d, p, isHeadshot = false) {
            const v = p.project(camera);
            const x = (v.x * 0.5 + 0.5) * window.innerWidth;
            const y = (v.y * -0.5 + 0.5) * window.innerHeight;
            const el = document.createElement('div');
            el.className = isHeadshot ? 'dmg-popup headshot' : 'dmg-popup';
            el.style.left = `${x}px`; 
            el.style.top = `${y}px`;
            el.innerText = Math.round(d);
            if (isHeadshot) el.innerHTML = `💀 ${Math.round(d)}`;
            document.getElementById('damage-nums').appendChild(el);
            setTimeout(() => el.remove(), isHeadshot ? 800 : 600);
        }

        function reload() {
            if (reloading) return;
            const id = loadout[activeSlot];
            const weapon = WEAPONS[id];
            if (weapon.heal) return;
            
            reloading = true;
            isReloadAnimating = true;
            document.getElementById('ammo-text').innerText = '...';
            
            playSound('reload');
            
            let reloadTime = weapon.reload;
            if (weapon.scope) reloadTime *= 1.5;
            if (weapon.id === 'hyperPistol') reloadTime = reloadTime * 0.833;
            if (weapon.id === 'twinMagAR') {
                const state = twinMagState[id];
                if (state && state.activeMag === 2) {
                    reloadTime = reloadTime / 2;
                }
            }
            
            const startY = gunGroup.position.y;
            const animInterval = setInterval(() => {
                gunGroup.position.y = startY - 0.05 + Math.sin(Date.now() * 0.02) * 0.03;
                gunGroup.rotation.z = Math.sin(Date.now() * 0.03) * 0.1;
            }, 16);
            
            setTimeout(() => {
                clearInterval(animInterval);
                gunGroup.position.y = startY;
                gunGroup.rotation.z = 0;
                
                if (weapon.twinMag) {
                    const state = twinMagState[id];
                    if (state) {
                        if (state.activeMag === 2) {
                            state.activeMag = 1;
                            ammo[id] = weapon.mag + magBonus;
                        } else {
                            ammo[id] = weapon.mag + magBonus;
                        }
                    }
                } else {
                    ammo[id] = weapon.mag + (weapon.scope ? 0 : magBonus);
                }
                reloading = false;
                isReloadAnimating = false;
                updateUI();
            }, reloadTime);
        }

        // ============ UI UPDATE ============
        function updateUI() {
            const id = loadout[activeSlot];
            const weapon = WEAPONS[id];
            
            if (!weapon.heal) {
                document.getElementById('ammo-text').innerText = ammo[id] || 0;
            } else {
                document.getElementById('ammo-text').innerText = usedHeals[id] ? '0' : '1';
            }
            
            document.getElementById('health-text').innerText = Math.ceil(hp);
            document.getElementById('health-bar-fill').style.width = `${(hp / 300) * 100}%`;
            document.getElementById('score-display').innerText = score.toString().padStart(5, '0');
            document.getElementById('lvl-display').innerText = level;
            document.getElementById('zombies-remaining').innerText = zombiesRemaining;
            
            if (hp <= 0) { 
                isRunning = false;
                stopSound('crowd');
                stopSound('police');
                backgroundMusicPlaying = false;
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem('trex_highscore', score);
                }
                document.getElementById('final-stats').innerHTML = `LEVEL ${level} | SCORE ${score}`;
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('death-menu').style.display = 'flex';
                controls.unlock();
                if (healing) clearInterval(healInterval);
            }
        }

        // ============ GAME LOOP ============
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const now = performance.now();
            zombieAnimTime += dt;

            frameCount++;
            if (now > lastTime + 1000) {
                fpsCounter.innerText = `FPS: ${frameCount}`;
                frameCount = 0; 
                lastTime = now;
            }

            if (isRunning && gameStarted) {
                const id = loadout[activeSlot];
                const weapon = WEAPONS[id];
                
                if (isFiring && !reloading && !isReloadAnimating) {
                    if (weapon.auto) {
                        fire();
                    } else if (!weapon.auto && now - lastFire > weapon.rate) {
                        fire();
                        isFiring = false;
                    }
                }

                velocity.x -= velocity.x * 10.0 * dt;
                velocity.z -= velocity.z * 10.0 * dt;
                velocity.y -= CONFIG.player.gravity * dt;

                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                const speed = CONFIG.player.walkSpeed;
                if (moveF || moveB) velocity.z -= direction.z * speed * 10 * dt;
                if (moveL || moveR) velocity.x -= direction.x * speed * 10 * dt;

                controls.moveRight(-velocity.x * dt);
                controls.moveForward(-velocity.z * dt);
                controls.getObject().position.y += (velocity.y * dt);

                const pos = controls.getObject().position;
                
                // Force field boundary
                const distFromCenter = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
                if (distFromCenter > CONFIG.forceFieldRadius) {
                    const angle = Math.atan2(pos.z, pos.x);
                    pos.x = Math.cos(angle) * CONFIG.forceFieldRadius;
                    pos.z = Math.sin(angle) * CONFIG.forceFieldRadius;
                    velocity.x = 0;
                    velocity.z = 0;
                }

                const groundY = getH(pos.x, pos.z) + CONFIG.player.height;
                if (pos.y < groundY) {
                    velocity.y = 0;
                    controls.getObject().position.y = groundY;
                    canJump = true;
                }

                const pPos = controls.getObject().position;
                for (let i = zombies.length - 1; i >= 0; i--) {
                    const z = zombies[i];
                    if (!z || !z.g || z.isDead) continue;
                    
                    tempVec.copy(pPos).sub(z.g.position);
                    tempVec.y = 0;
                    const dist = tempVec.length();
                    
                    if (z.leftArm && z.rightArm) {
                        z.leftArm.rotation.x = 0.8 + Math.sin(zombieAnimTime * 6) * 0.3;
                        z.rightArm.rotation.x = 0.8 + Math.cos(zombieAnimTime * 6) * 0.3;
                    }
                    
                    if (dist > 1.5) {
                        tempVec.normalize().multiplyScalar(z.s * dt);
                        z.g.position.add(tempVec);
                        z.g.lookAt(pPos.x, z.g.position.y, pPos.z);
                        z.g.position.y = getH(z.g.position.x, z.g.position.z);
                    } else if (now - z.lastA > 800) {
                        hp -= (12 + level * 2) * (z.damage || 1);
                        z.lastA = now;
                        playSound('hit');
                        
                        const bloodTrail = new THREE.Mesh(new THREE.CircleGeometry(0.3, 4), new THREE.MeshStandardMaterial({ color: 0xaa0000, transparent: true, opacity: 0.6 }));
                        bloodTrail.rotation.x = -Math.PI/2;
                        bloodTrail.position.set(pPos.x, getH(pPos.x, pPos.z) + 0.05, pPos.z);
                        scene.add(bloodTrail);
                        setTimeout(() => scene.remove(bloodTrail), 30000);
                        
                        updateUI();
                    }
                }
                
                // Animate police car lights
                policeCars.forEach((car, index) => {
                    const time = Date.now() * 0.005;
                    car.children.forEach(child => {
                        if (child.isMesh && child.material.emissiveIntensity !== undefined) {
                            const colorHex = child.material.color ? child.material.color.getHex() : 0;
                            if (colorHex === 0xff0000 || colorHex === 0x0000ff) {
                                child.material.emissiveIntensity = 0.3 + Math.sin(time + index) * 0.3;
                            }
                        }
                    });
                });

                const isMoving = Math.abs(velocity.x) > 0.1 || Math.abs(velocity.z) > 0.1;
                if (isMoving && canJump) walkBob += dt * 6;
                else walkBob = 0;
                
                const bobY = Math.sin(walkBob) * 0.01;
                
                if (!isReloadAnimating) {
                    gunGroup.position.y = -0.25 + bobY;
                }
            }
            composer.render();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============ START EVERYTHING ============
        function init() {
            initRenderer();
            initScene();
            initCamera();
            initPostProcessing();
            initLighting();
            initMuzzleFlash();
            createWorld();
            initializeAmmo();
            createGun(loadout[activeSlot]);
            setupUI();
            setupControls();
            updateSlotDisplay();
            animate();
        }

        init();
    </script>
</body>
</html>
